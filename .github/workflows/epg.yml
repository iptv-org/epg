name: EPG Weltweit generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-worldwide-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🌍 EPG für 20 Länder generieren
        run: |
          echo "🚀 Starte EPG-Generierung..."
          mkdir -p public/epg
          cd epg
          
          # Länder mit ihren Sendern
          COUNTRIES=(
            "de|ard.de,zdf.de,rtl.de"
            "at|orf.at"
            "ch|srf.ch"
            "fr|tf1.fr,france2.fr"
            "it|rai.it,mediaset.it"
            "es|rtve.es,antena3.com"
            "pt|rtp.pt"
            "gb|bbc.co.uk,itv.com"
            "us|abc.com,nbc.com"
            "ca|cbc.ca"
            "nl|npo.nl"
            "be|rtbf.be"
            "se|svt.se"
            "no|nrk.no"
            "dk|dr.dk"
            "fi|yle.fi"
            "pl|tvn.pl"
            "cz|ceskatelevize.cz"
            "hu|mtva.hu"
            "ru|rtr.ru"
          )
          
          for country_entry in "${COUNTRIES[@]}"; do
            IFS='|' read -r country senders <<< "$country_entry"
            
            echo ""
            echo "🌍 Generiere EPG für: $country"
            
            temp_file="../public/epg/$country.tmp"
            final_file="../public/epg/$country.xml"
            
            > "$temp_file"
            
            IFS=',' read -ra sender_list <<< "$senders"
            for sender in "${sender_list[@]}"; do
              echo "   📺 $sender"
              if npm run grab --- --site=$sender --output=sender_temp.xml --days=3 --maxConnections=2 --timeout=30000; then
                if [ -f sender_temp.xml ]; then
                  grep -v "<?xml" sender_temp.xml | grep -v "</tv>" >> "$temp_file" || true
                  rm sender_temp.xml
                fi
              fi
            done
            
            if [ -s "$temp_file" ]; then
              echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?><tv>" > "$final_file"
              cat "$temp_file" >> "$final_file"
              echo "</tv>" >> "$final_file"
              rm "$temp_file"
              echo "✅ $country: $(wc -c < $final_file) Bytes"
            else
              # Platzhalter erstellen
              cat > "$final_file" << EOF
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="$country"><display-name>$country</display-name></channel>
  <programme channel="$country" start="$(date -u +'%Y%m%d%H%M%S') +0000" stop="$(date -u -d '+1 day' +'%Y%m%d%H%M%S') +0000">
    <title>EPG für $country</title>
  </programme>
</tv>
EOF
              [ -f "$temp_file" ] && rm "$temp_file"
              echo "⚠️ $country: Platzhalter"
            fi
            sleep 1
          done
          
          cd ..
      
      - name: 🗑️ Temporäre Dateien löschen
        run: |
          rm -f public/epg/*.tmp
          echo "✅ Temporäre Dateien gelöscht"
      
      - name: 📊 Index.json erstellen
        run: |
          cd public/epg
          
          echo "{" > index.json
          echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
          echo "  \"totalCountries\": $(ls *.xml | wc -l)," >> index.json
          echo "  \"countries\": [" >> index.json
          
          first=1
          for file in *.xml; do
            if [ "$first" -eq 1 ]; then
              first=0
            else
              echo "," >> index.json
            fi
            country=$(basename "$file" .xml)
            size=$(wc -c < "$file")
            echo "    {\"code\":\"$country\",\"file\":\"$file\",\"size\":$size}" >> index.json
          done
          
          echo "  ]" >> index.json
          echo "}" >> index.json
          
          echo "✅ index.json mit $(ls *.xml | wc -l) Ländern erstellt"
      
      - name: 📋 Dateien anzeigen
        run: |
          echo "📁 Fertige EPG-Dateien:"
          ls -la public/epg/*.xml | head -10
          
          echo ""
          echo "📄 index.json:"
          cat public/epg/index.json
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
