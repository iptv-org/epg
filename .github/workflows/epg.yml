name: EPG Weltweit generieren

on:
  schedule:
    - cron: '0 2 * * *'  # Täglich um 2 Uhr UTC
  workflow_dispatch:

jobs:
  generate-worldwide-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🌍 EPG für TOP 20 Länder generieren
        run: |
          echo "🚀 Starte EPG-Generierung für TOP 20 Länder..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg
          
          cd epg
          
          # Liste der TOP 20 Länder mit ihren wichtigsten Sendern
          # Format: land|sender1,sender2,sender3
          COUNTRIES=(
            "de|ard.de,zdf.de,rtl.de"
            "at|orf.at"
            "ch|srf.ch"
            "fr|tf1.fr,france2.fr"
            "it|rai.it,mediaset.it"
            "es|rtve.es,antena3.com"
            "pt|rtp.pt"
            "gb|bbc.co.uk,itv.com"
            "us|abc.com,nbc.com"
            "ca|cbc.ca"
            "nl|npo.nl"
            "be|rtbf.be"
            "se|svt.se"
            "no|nrk.no"
            "dk|dr.dk"
            "fi|yle.fi"
            "pl|tvn.pl"
            "cz|ceskatelevize.cz"
            "hu|mtva.hu"
            "ru|rtr.ru"
          )
          
          # Für jedes Land EPG generieren
          for country_entry in "${COUNTRIES[@]}"; do
            # Land und Sender trennen
            IFS='|' read -r country senders <<< "$country_entry"
            
            echo ""
            echo "------------------------------------------------"
            echo "🌍 Generiere EPG für: $country"
            echo "------------------------------------------------"
            
            # Temporäre Datei für dieses Land
            temp_file="../public/epg/$country.tmp"
            final_file="../public/epg/$country.xml"
            
            # Leere Datei erstellen
            > "$temp_file"
            
            # Für jeden Sender EPG holen
            IFS=',' read -ra sender_list <<< "$senders"
            for sender in "${sender_list[@]}"; do
              echo "   📺 Sender: $sender"
              
              # EPG für diesen Sender generieren
              if npm run grab --- --site=$sender --output=sender_temp.xml --days=3 --maxConnections=2 --timeout=30000; then
                if [ -f sender_temp.xml ]; then
                  # XML-Inhalt anhängen (ohne Header/Footer)
                  grep -v "<?xml" sender_temp.xml | grep -v "</tv>" >> "$temp_file" || true
                  rm sender_temp.xml
                  echo "      ✅ Erfolg"
                fi
              else
                echo "      ⚠️ Fehler - überspringe"
              fi
            done
            
            # Finale XML erstellen
            if [ -s "$temp_file" ]; then
              echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?><tv>" > "$final_file"
              cat "$temp_file" >> "$final_file"
              echo "</tv>" >> "$final_file"
              rm "$temp_file"
              
              # Größe anzeigen
              size=$(wc -c < "$final_file")
              echo "✅ $country: $size Bytes"
            else
              # Platzhalter erstellen, falls keine Daten
              echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?><tv>" > "$final_file"
              echo "  <channel id=\"$country\"><display-name>$country</display-name></channel>" >> "$final_file"
              echo "  <programme channel=\"$country\" start=\"$(date -u +'%Y%m%d%H%M%S') +0000\" stop=\"$(date -u -d '+1 day' +'%Y%m%d%H%M%S') +0000\">" >> "$final_file"
              echo "    <title>EPG für $country</title>" >> "$final_file"
              echo "  </programme>" >> "$final_file"
              echo "</tv>" >> "$final_file"
              echo "⚠️ $country: Platzhalter erstellt"
            fi
            
            # Kurze Pause
            sleep 2
          done
          
          cd ..
      
      - name: 📊 Index.json erstellen
        run: |
          cd public/epg
          
          # JSON-Array für Länder erstellen
          echo "{" > index.json
          echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
          echo "  \"totalCountries\": $(ls *.xml 2>/dev/null | wc -l)," >> index.json
          echo "  \"countries\": [" >> index.json
          
          first=1
          for file in *.xml; do
            if [ "$first" -eq 1 ]; then
              first=0
            else
              echo "," >> index.json
            fi
            country=$(basename "$file" .xml)
            size=$(wc -c < "$file")
            echo "    {\"code\":\"$country\",\"file\":\"$file\",\"size\":$size}" >> index.json
          done
          
          echo "  ]" >> index.json
          echo "}" >> index.json
          
          echo "✅ index.json erstellt"
          echo "📊 Gefundene Länder: $(ls *.xml | wc -l)"
      
      - name: 📋 Dateien anzeigen
        run: |
          echo "📁 Generierte EPG-Dateien:"
          ls -la public/epg/ | head -10
          
          echo ""
          echo "📄 index.json:"
          cat public/epg/index.json
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Abschluss
        run: |
          echo ""
          echo "================================================"
          echo "✅ EPG-Weltweit Update abgeschlossen!"
          echo "================================================"
          echo "📊 Verfügbar unter:"
          echo "   • https://epg.pages.dev/epg/index.json"
          echo "   • https://epg.pages.dev/epg/de.xml"
          echo "   • https://epg.pages.dev/epg/it.xml"
          echo "   • https://epg.pages.dev/epg/fr.xml"
          echo "   • ... und 20+ weitere Länder"
          echo "================================================"
