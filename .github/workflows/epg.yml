name: EPG generieren

on:
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: EPG-Datei erstellen
        run: |
          mkdir -p public/epg/de
          
          # XML-Datei erstellen
          cat > public/epg/de/ard.de.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="ard.de">
              <display-name>ARD</display-name>
            </channel>
            <programme channel="ard.de" start="20260311200000 +0100" stop="20260311201500 +0100">
              <title>Tagesschau</title>
            </programme>
          </tv>
          EOF
          
          # Index.json erstellen
          cat > public/epg/de/index.json << 'EOF'
          {
            "lastUpdate": "2026-03-11T20:00:00Z",
            "country": "Deutschland",
            "totalChannels": 1,
            "channels": [
              {
                "channel": "ard.de",
                "file": "ard.de.xml"
              }
            ]
          }
          EOF
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
