name: EPG Weltweit generieren

on:
  workflow_dispatch:

jobs:
  generate-worldwide-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🌍 EPG für Deutschland testen
        run: |
          echo "🚀 Teste EPG-Generierung für Deutschland..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg
          
          cd epg
          
          # Nur ARD testen
          echo "Generiere EPG für ard.de..."
          npm run grab --- --site=ard.de --output=../public/epg/test-de.xml --days=1 --maxConnections=1
          
          cd ..
          
          echo "✅ Test abgeschlossen"
      
      - name: 📊 Index-Datei erstellen
        run: |
          cd public/epg
          
          # Prüfe ob Datei existiert
          if [ -f "test-de.xml" ]; then
            echo "✅ test-de.xml gefunden"
            size=$(wc -c < test-de.xml)
            
            # Einfache Index.json erstellen
            echo "{\"lastUpdate\":\"$(date -Iseconds)\",\"countries\":[{\"country\":\"de\",\"file\":\"test-de.xml\",\"size\":$size}]}" > index.json
            
            echo "✅ index.json erstellt"
          else
            echo "⚠️ Keine XML-Datei gefunden"
            echo "{\"lastUpdate\":\"$(date -Iseconds)\",\"countries\":[]}" > index.json
            exit 1
          fi
      
      - name: 📋 Generierte Dateien anzeigen
        run: |
          echo "📁 Inhalt von public/epg/:"
          ls -la public/epg/
          
          echo ""
          echo "📄 Inhalt von index.json:"
          cat public/epg/index.json
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
