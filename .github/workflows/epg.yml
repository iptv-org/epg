name: EPG Simple

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: EPG für 3 Länder generieren
        run: |
          mkdir -p public/epg
          
          # Deutschland
          cat > public/epg/de.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="ard.de">
              <display-name>ARD</display-name>
            </channel>
            <programme channel="ard.de" start="20240311200000 +0100" stop="20240311201500 +0100">
              <title>Tagesschau</title>
            </programme>
          </tv>
          EOF
          
          # Italien
          cat > public/epg/it.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="rai1.it">
              <display-name>RAI 1</display-name>
            </channel>
            <programme channel="rai1.it" start="20240311200000 +0100" stop="20240311203500 +0100">
              <title>TG1</title>
            </programme>
          </tv>
          EOF
          
          # Frankreich
          cat > public/epg/fr.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="tf1.fr">
              <display-name>TF1</display-name>
            </channel>
            <programme channel="tf1.fr" start="20240311200000 +0100" stop="20240311204500 +0100">
              <title>Journal</title>
            </programme>
          </tv>
          EOF
          
          # Index
          cat > public/epg/index.json << 'EOF'
          {
            "lastUpdate": "2024-03-11T20:00:00Z",
            "countries": [
              {"code": "de", "name": "Deutschland", "file": "de.xml"},
              {"code": "it", "name": "Italien", "file": "it.xml"},
              {"code": "fr", "name": "Frankreich", "file": "fr.xml"}
            ]
          }
          EOF
          
          echo "✅ EPG-Dateien erstellt:"
          ls -la public/epg/
      
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
