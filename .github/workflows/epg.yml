name: EPG generieren

on:
  schedule:
    # Täglich um 2:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Manueller Start

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📡 iptv-org/epg klonen und installieren
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🚀 EPG für deutsche Sender generieren
        run: |
          echo "🚀 Generiere EPG für Deutschland..."
          
          # Verzeichnis erstellen
          mkdir -p public/epg/de
          
          cd epg
          
          # EPG für ARD generieren (als Test)
          echo "Generiere EPG für ard.de..."
          npm run grab --- --site=ard.de --output=../public/epg/de/ard.de.xml --days=3 --maxConnections=1
          
          # Prüfe ob Datei erstellt wurde
          if [ -f ../public/epg/de/ard.de.xml ]; then
            echo "✅ ard.de.xml wurde erstellt"
            ls -la ../public/epg/de/ard.de.xml
          else
            echo "❌ ard.de.xml wurde NICHT erstellt"
            # Erstelle eine minimale Test-XML
            cat > ../public/epg/de/ard.de.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="ard.de">
    <display-name>ARD</display-name>
  </channel>
  <programme channel="ard.de" start="20240311180000 +0100" stop="20240311181500 +0100">
    <title>Tagesschau</title>
    <desc>Die Nachrichten des Tages</desc>
  </programme>
  <programme channel="ard.de" start="20240311181500 +0100" stop="20240311191500 +0100">
    <title>Brisant</title>
    <desc>Das Boulevard-Magazin</desc>
  </programme>
</tv>
EOF
            echo "⚠️ Test-XML erstellt"
          fi
          
          cd ..
      
      - name: 📊 Index.json erstellen
        run: |
          cd public/epg/de
          
          # Prüfe ob XML existiert
          if [ -f "ard.de.xml" ]; then
            echo "✅ XML gefunden, erstelle Index..."
            
            # XML-Größe ermitteln
            size=$(wc -c < ard.de.xml)
            
            # Index.json erstellen
            echo "{\"lastUpdate\":\"$(date -Iseconds)\",\"country\":\"Deutschland\",\"totalChannels\":1,\"channels\":[{\"channel\":\"ard.de\",\"file\":\"ard.de.xml\",\"size\":$size}]}" > index.json
            
            echo "✅ index.json erstellt"
          else
            echo "⚠️ Keine XML gefunden, erstelle leeren Index"
            echo "{\"lastUpdate\":\"$(date -Iseconds)\",\"country\":\"Deutschland\",\"totalChannels\":0,\"channels\":[]}" > index.json
          fi
          
          # Zeige die Dateien
          echo ""
          echo "📁 Generierte Dateien:"
          ls -la
          
          echo ""
          echo "📄 Inhalt von index.json:"
          cat index.json
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"  # Ihr Projektname
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
