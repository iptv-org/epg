name: EPG Weltweit generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-worldwide-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: đź“¦ Repository auschecken
        uses: actions/checkout@v3
      
      - name: đź”§ Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: đź“ˇ iptv-org/epg klonen
        run: |
          echo "đź“ˇ Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "đź“¦ Installiere AbhĂ¤ngigkeiten..."
          npm install
          echo "âś… iptv-org/epg bereit"
      
      - name: đźŚŤ EPG fĂĽr ALLE LĂ¤nder mit echten Sendern generieren
        run: |
          echo "đźš€ Starte EPG-Generierung fĂĽr ALLE LĂ¤nder..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg
          
          cd epg
          
          # DEFINITION DER LĂ„NDER MIT IHREN TOP-SENDERN
          # FĂĽr jedes Land die wichtigsten Sender
          declare -A COUNTRY_CHANNELS
          
          # Deutschland
          COUNTRY_CHANNELS["de"]="ard.de zdf.de rtl.de sat1.de prosieben.de"
          # Italien
          COUNTRY_CHANNELS["it"]="rai.it mediaset.it la7.it"
          # Frankreich
          COUNTRY_CHANNELS["fr"]="tf1.fr france2.fr france3.fr m6.fr"
          # GroĂźbritannien
          COUNTRY_CHANNELS["gb"]="bbc.co.uk itv.com channel4.com"
          # USA
          COUNTRY_CHANNELS["us"]="abc.com nbc.com cbs.com fox.com"
          # Spanien
          COUNTRY_CHANNELS["es"]="rtve.es antena3.com telecinco.es"
          # Ă–sterreich
          COUNTRY_CHANNELS["at"]="orf.at"
          # Schweiz
          COUNTRY_CHANNELS["ch"]="srf.ch rts.ch rsi.ch"
          # Niederlande
          COUNTRY_CHANNELS["nl"]="npo.nl"
          # Belgien
          COUNTRY_CHANNELS["be"]="rtbf.be vrt.be"
          # Portugal
          COUNTRY_CHANNELS["pt"]="rtp.pt"
          # Schweden
          COUNTRY_CHANNELS["se"]="svt.se tv4.se"
          # Norwegen
          COUNTRY_CHANNELS["no"]="nrk.no tv2.no"
          # DĂ¤nemark
          COUNTRY_CHANNELS["dk"]="dr.dk tv2.dk"
          # Finnland
          COUNTRY_CHANNELS["fi"]="yle.fi mtv.fi"
          # Polen
          COUNTRY_CHANNELS["pl"]="tvn.pl polsat.pl"
          # Tschechien
          COUNTRY_CHANNELS["cz"]="ceskatelevize.cz nova.cz"
          # Ungarn
          COUNTRY_CHANNELS["hu"]="mtva.hu rtl.hu"
          # RumĂ¤nien
          COUNTRY_CHANNELS["ro"]="tvr.ro protv.ro"
          # Bulgarien
          COUNTRY_CHANNELS["bg"]="bnt.bg btv.bg"
          # Griechenland
          COUNTRY_CHANNELS["gr"]="ert.gr skai.gr"
          # TĂĽrkei
          COUNTRY_CHANNELS["tr"]="trt.net.tr atv.com.tr"
          # Russland
          COUNTRY_CHANNELS["ru"]="rtr.ru ntv.ru"
          # Japan
          COUNTRY_CHANNELS["jp"]="nhk.or.jp"
          # China
          COUNTRY_CHANNELS["cn"]="cctv.com"
          # Indien
          COUNTRY_CHANNELS["in"]="doordarshan.gov.in"
          # Australien
          COUNTRY_CHANNELS["au"]="abc.net.au sbs.com.au"
          # Kanada
          COUNTRY_CHANNELS["ca"]="cbc.ca ctv.ca"
          # Mexiko
          COUNTRY_CHANNELS["mx"]="televisa.com tvazteca.com"
          # Brasilien
          COUNTRY_CHANNELS["br"]="globo.com recordtv.com"
          # Argentinien
          COUNTRY_CHANNELS["ar"]="tvpublica.com.ar telefe.com"
          # SĂĽdafrika
          COUNTRY_CHANNELS["za"]="sabc.co.za"
          
          # FĂĽr alle anderen LĂ¤nder: Fallback auf LĂ¤ndercode
          OTHER_COUNTRIES=(
            "al" "am" "az" "ba" "bd" "bg" "bo" "by" "cl" "co"
            "cr" "cu" "cy" "do" "ec" "ee" "eg" "ge" "gt" "hk"
            "hn" "hr" "id" "ie" "il" "iq" "ir" "is" "jo" "ke"
            "kg" "kh" "kr" "kw" "kz" "la" "lb" "lk" "lt" "lv"
            "ly" "ma" "md" "me" "mk" "mm" "mn" "mt" "my" "ng"
            "ni" "np" "nz" "om" "pa" "pe" "ph" "pk" "pr" "ps"
            "py" "qa" "rs" "sa" "sg" "si" "sk" "sn" "sv" "sy"
            "th" "tj" "tn" "tw" "tz" "ua" "ug" "uy" "uz" "ve"
            "vn" "ye" "zw"
          )
          
          # EPG fĂĽr LĂ¤nder mit definierten Sendern generieren
          for country in "${!COUNTRY_CHANNELS[@]}"; do
            echo ""
            echo "------------------------------------------------"
            echo "đźŚŤ Generiere EPG fĂĽr $country"
            echo "------------------------------------------------"
            
            # Leere Datei fĂĽr dieses Land erstellen
            > ../public/epg/$country.xml
            
            # FĂĽr jeden Sender dieses Landes EPG holen
            for channel in ${COUNTRY_CHANNELS[$country]}; do
              echo "   đź“ş Sender: $channel"
              if npm run grab --- --site=$channel --output=temp.xml --days=7 --maxConnections=2 --timeout=30000; then
                if [ -f temp.xml ]; then
                  # XML-Inhalt anhĂ¤ngen (ohne Header)
                  grep -v "<?xml" temp.xml | grep -v "</tv>" >> ../public/epg/$country.xml || true
                  rm temp.xml
                fi
              fi
            done
            
            # XML-Datei fertigstellen
            if [ -f ../public/epg/$country.xml ]; then
              # Header und Footer hinzufĂĽgen
              echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?><tv>" | cat - ../public/epg/$country.xml > temp && mv temp ../public/epg/$country.xml
              echo "</tv>" >> ../public/epg/$country.xml
              
              # GrĂ¶Ăźe prĂĽfen
              size=$(wc -c < ../public/epg/$country.xml)
              echo "âś… $country: $size Bytes"
            fi
          done
          
          # FĂĽr alle anderen LĂ¤nder Platzhalter erstellen
          for country in "${OTHER_COUNTRIES[@]}"; do
            echo ""
            echo "------------------------------------------------"
            echo "đźŚŤ Erstelle Platzhalter fĂĽr $country"
            echo "------------------------------------------------"
            
            cat > ../public/epg/$country.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="$country">
    <display-name>$country</display-name>
  </channel>
  <programme channel="$country" start="$(date -u +'%Y%m%d%H%M%S') +0000" stop="$(date -u -d '+1 day' +'%Y%m%d%H%M%S') +0000">
    <title>EPG fĂĽr $country in Vorbereitung</title>
    <desc>Daten werden in KĂĽrze verfĂĽgbar sein.</desc>
  </programme>
</tv>
EOF
            echo "âś… Platzhalter fĂĽr $country erstellt"
          done
          
          cd ..
      
      - name: đź“Š Index.json erstellen
        run: |
          cd public/epg
          
          # XML-Dateien zĂ¤hlen
          xml_files=$(ls *.xml 2>/dev/null | wc -l)
          
          # Index.json erstellen
          echo "{" > index.json
          echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
          echo "  \"totalCountries\": $xml_files," >> index.json
          echo "  \"countries\": [" >> index.json
          
          first=1
          for file in *.xml; do
            if [ "$first" -eq 1 ]; then
              first=0
            else
              echo "," >> index.json
            fi
            country=$(basename "$file" .xml)
            size=$(wc -c < "$file")
            echo "    {\"country\":\"$country\",\"file\":\"$file\",\"size\":$size}" >> index.json
          done
          
          echo "  ]" >> index.json
          echo "}" >> index.json
          
          echo "âś… index.json erstellt mit $xml_files LĂ¤ndern"
      
      - name: đź“¤ Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
