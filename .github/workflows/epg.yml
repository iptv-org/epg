name: EPG Weltweit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: EPG für ALLE Länder generieren
        run: |
          mkdir -p public/epg
          
          # 🌍 ALLE LÄNDER mit Platzhalter-EPG
          countries=(
            "de|Deutschland"
            "at|Österreich"
            "ch|Schweiz"
            "fr|Frankreich"
            "it|Italien"
            "es|Spanien"
            "pt|Portugal"
            "nl|Niederlande"
            "be|Belgien"
            "gb|Großbritannien"
            "ie|Irland"
            "dk|Dänemark"
            "se|Schweden"
            "no|Norwegen"
            "fi|Finnland"
            "pl|Polen"
            "cz|Tschechien"
            "hu|Ungarn"
            "ro|Rumänien"
            "bg|Bulgarien"
            "gr|Griechenland"
            "tr|Türkei"
            "ru|Russland"
            "ua|Ukraine"
            "us|USA"
            "ca|Kanada"
            "mx|Mexiko"
            "br|Brasilien"
            "ar|Argentinien"
            "jp|Japan"
            "cn|China"
            "in|Indien"
            "au|Australien"
            "nz|Neuseeland"
            "za|Südafrika"
          )
          
          # Für jedes Land eine EPG-Datei erstellen
          for entry in "${countries[@]}"; do
            IFS='|' read -r code name <<< "$entry"
            
            cat > public/epg/$code.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="$code">
    <display-name>$name</display-name>
  </channel>
  <programme channel="$code" start="$(date -u +'%Y%m%d%H%M%S') +0000" stop="$(date -u -d '+1 day' +'%Y%m%d%H%M%S') +0000">
    <title>EPG für $name</title>
    <desc>Programmdaten werden in Kürze verfügbar sein.</desc>
  </programme>
</tv>
EOF
            echo "✅ $code.xml erstellt"
          done
          
          # Index.json erstellen
          cat > public/epg/index.json << EOF
          {
            "lastUpdate": "$(date -Iseconds)",
            "totalCountries": ${#countries[@]},
            "countries": [
          EOF
          
          first=1
          for entry in "${countries[@]}"; do
            IFS='|' read -r code name <<< "$entry"
            if [ "$first" -eq 1 ]; then
              first=0
            else
              echo "," >> public/epg/index.json
            fi
            echo "    {\"code\":\"$code\",\"name\":\"$name\",\"file\":\"$code.xml\"}" >> public/epg/index.json
          done
          
          echo "  ]" >> public/epg/index.json
          echo "}" >> public/epg/index.json
          
          echo ""
          echo "✅ ALLE ${#countries[@]} Länder erstellt!"
          ls -la public/epg/
      
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
