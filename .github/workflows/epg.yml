name: EPG Simple

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Create EPG files
        run: |
          mkdir -p public/epg
          echo "Deutschland EPG" > public/epg/de.txt
          echo "Italien EPG" > public/epg/it.txt
          echo "Frankreich EPG" > public/epg/fr.txt
          ls -la public/epg/
      
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
