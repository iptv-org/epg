name: EPG aus iptv-org Fork generieren

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: 📦 iptv-org/epg Fork auschecken
        uses: actions/checkout@v3
        with:
          repository: ColomboEnterprise/epg
          path: epg-fork
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: 📦 Abhängigkeiten installieren
        run: |
          cd epg-fork
          npm install
          echo "✅ Abhängigkeiten installiert"
      
      - name: 🌍 EPG für ALLE Länder generieren
        run: |
          echo "🚀 Starte EPG-Generierung aus dem Fork..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg
          
          cd epg-fork
          
          # 🌍 ALLE LÄNDER aus dem iptv-org Repository
          LAENDER=(
            "de" "at" "ch" "fr" "it" "es" "pt" "nl" "be" "lu"
            "gb" "ie" "dk" "se" "no" "fi" "pl" "cz" "sk" "hu"
            "ro" "bg" "rs" "hr" "si" "ba" "me" "mk" "al" "gr"
            "tr" "ee" "lv" "lt" "by" "ua" "md" "ru" "us" "ca"
            "mx" "ar" "br" "cl" "co" "pe" "ve" "au" "nz" "jp"
            "kr" "cn" "in" "id" "my" "sg" "th" "vn" "ph" "za"
          )
          
          GESAMT=${#LAENDER[@]}
          AKTUELL=0
          ERFOLGREICH=0
          
          echo "================================================"
          echo "📊 Generiere EPG für $GESAMT Länder"
          echo "================================================"
          
          for land in "${LAENDER[@]}"; do
            AKTUELL=$((AKTUELL + 1))
            echo ""
            echo "[$AKTUELL/$GESAMT] Generiere EPG für: $land"
            
            if npm run grab --- --site=$land --output=../public/epg/$land.xml --days=7 --maxConnections=3 --timeout=60000; then
              echo "  ✅ $land erfolgreich"
              ERFOLGREICH=$((ERFOLGREICH + 1))
            else
              echo "  ⚠️ $land fehlgeschlagen"
            fi
            
            sleep 2
          done
          
          cd ..
          
          echo ""
          echo "================================================"
          echo "📊 Generierung abgeschlossen:"
          echo "   ✅ Erfolgreich: $ERFOLGREICH von $GESAMT"
          echo "   📁 Verzeichnis: public/epg/"
          echo "================================================"
      
      - name: 📊 Länderliste erstellen
        run: |
          cd public/epg
          
          # Liste aller generierten Länder
          ls *.xml 2>/dev/null | sed 's/\.xml$//' > laender.txt
          
          # Ländernamen
          cat > namen.txt << 'EOF'
          Deutschland|de
          Österreich|at
          Schweiz|ch
          Frankreich|fr
          Italien|it
          Spanien|es
          Portugal|pt
          Niederlande|nl
          Belgien|be
          Luxemburg|lu
          Großbritannien|gb
          Irland|ie
          Dänemark|dk
          Schweden|se
          Norwegen|no
          Finnland|fi
          Polen|pl
          Tschechien|cz
          Slowakei|sk
          Ungarn|hu
          Rumänien|ro
          Bulgarien|bg
          Serbien|rs
          Kroatien|hr
          Slowenien|si
          Bosnien|ba
          Montenegro|me
          Nordmazedonien|mk
          Albanien|al
          Griechenland|gr
          Türkei|tr
          Estland|ee
          Lettland|lv
          Litauen|lt
          Belarus|by
          Ukraine|ua
          Moldau|md
          Russland|ru
          USA|us
          Kanada|ca
          Mexiko|mx
          Argentinien|ar
          Brasilien|br
          Chile|cl
          Kolumbien|co
          Peru|pe
          Venezuela|ve
          Australien|au
          Neuseeland|nz
          Japan|jp
          Südkorea|kr
          China|cn
          Indien|in
          Indonesien|id
          Malaysia|my
          Singapur|sg
          Thailand|th
          Vietnam|vn
          Philippinen|ph
          Südafrika|za
          EOF
          
          echo "✅ Länderlisten erstellt"
          ls -la
      
      - name: 📊 Statistiken erstellen (korrigiert)
        run: |
          cd public/epg
          
          # JSON manuell erstellen ohne Bash-Probleme
          echo "{" > stats.json
          echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> stats.json
          echo "  \"source\": \"iptv-org/epg Fork\"," >> stats.json
          echo "  \"totalCountries\": $(ls *.xml 2>/dev/null | wc -l)," >> stats.json
          echo "  \"countries\": [" >> stats.json
          
          # Dateien durchgehen
          COUNTER=0
          for file in *.xml 2>/dev/null; do
            if [ -f "$file" ]; then
              if [ $COUNTER -gt 0 ]; then
                echo "," >> stats.json
              fi
              
              LAND=$(basename "$file" .xml)
              GROESSE=$(wc -c < "$file" | tr -d ' ')
              PROGRAMME=$(grep -c "<programme" "$file" 2>/dev/null || echo "0")
              
              echo "    {" >> stats.json
              echo "      \"country\": \"$LAND\"," >> stats.json
              echo "      \"file\": \"$file\"," >> stats.json
              echo "      \"size\": $GROESSE," >> stats.json
              echo "      \"programmes\": $PROGRAMME" >> stats.json
              echo -n "    }" >> stats.json
              
              COUNTER=$((COUNTER + 1))
            fi
          done
          
          echo "" >> stats.json
          echo "  ]" >> stats.json
          echo "}" >> stats.json
          
          echo "✅ stats.json erstellt"
          cat stats.json | head -20
      
      - name: 📄 Index-Seite erstellen
        run: |
          cd public/epg
          
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="de">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>📺 EPG aus iptv-org Fork</title>
            <style>
              body { font-family: sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #0a0c10; color: #e6edf3; }
              h1 { color: #58a6ff; border-bottom: 2px solid #30363d; padding-bottom: 10px; }
              h2 { color: #8b949e; margin-top: 30px; }
              .stats { background: #161b22; padding: 20px; border-radius: 10px; margin: 20px 0; }
              table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 10px; }
              th { background: #21262d; color: #8b949e; padding: 12px; text-align: left; }
              td { padding: 10px 12px; border-bottom: 1px solid #30363d; }
              a { color: #58a6ff; text-decoration: none; }
              .footer { margin-top: 40px; color: #8b949e; text-align: center; }
            </style>
          </head>
          <body>
            <h1>📺 EPG aus iptv-org Fork</h1>
            
            <div class="stats" id="stats">
              <p>Lade Statistiken...</p>
            </div>

            <h2>📁 Verfügbare EPG-Dateien</h2>
            <table id="fileTable">
              <thead>
                <tr><th>Land</th><th>Datei</th><th>Größe</th><th>Programme</th></tr>
              </thead>
              <tbody id="fileList"></tbody>
            </table>

            <div class="footer">
              <p>Generiert aus dem iptv-org/epg Fork • Tägliche Aktualisierung</p>
            </div>

            <script>
              fetch('stats.json')
                .then(r => r.json())
                .then(stats => {
                  let totalSize = 0;
                  let html = '';
                  
                  stats.countries.forEach(c => {
                    totalSize += c.size;
                    html += `<tr><td>${c.country}</td><td><a href="${c.file}">${c.file}</a></td><td>${formatBytes(c.size)}</td><td>${c.programmes}</td></tr>`;
                  });
                  
                  document.getElementById('fileList').innerHTML = html;
                  document.getElementById('stats').innerHTML = `
                    <p><strong>Letztes Update:</strong> ${new Date(stats.lastUpdate).toLocaleString()}</p>
                    <p><strong>Länder:</strong> ${stats.totalCountries}</p>
                    <p><strong>Gesamtgröße:</strong> ${formatBytes(totalSize)}</p>
                  `;
                });
              
              function formatBytes(b) { 
                if(b==0) return '0 Bytes'; 
                const i=Math.floor(Math.log(b)/Math.log(1024)); 
                return parseFloat((b/Math.pow(1024,i)).toFixed(2))+' '+['Bytes','KB','MB','GB'][i]; 
              }
            </script>
          </body>
          </html>
          EOF
          
          echo "✅ index.html erstellt"
          ls -la
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
