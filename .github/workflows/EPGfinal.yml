name: EPG Deutschland

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install
      
      - name: Generate EPG for ARD
        run: |
          mkdir -p public/epg/de
          cd epg
          npm run grab --- --site=ard.de --output=../public/epg/de/ard.de.xml --days=1
          cd ..
      
      - name: Create index.json
        run: |
          cd public/epg/de
          echo "{" > index.json
          echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
          echo "  \"country\": \"Deutschland\"," >> index.json
          echo "  \"countryCode\": \"de\"," >> index.json
          echo "  \"totalChannels\": 1," >> index.json
          echo "  \"channels\": [" >> index.json
          echo "    {\"channel\": \"ard.de\", \"file\": \"ard.de.xml\"}" >> index.json
          echo "  ]" >> index.json
          echo "}" >> index.json
          
          # Kopie als gesamt.xml
          cp ard.de.xml gesamt.xml
      
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
