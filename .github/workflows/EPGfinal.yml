name: EPG Weltweit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: iptv-org/epg installieren
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install
      
      - name: EPG für alle Sprachen generieren
        run: |
          # Verzeichnis anlegen
          mkdir -p public/epg
          
          echo "========================================="
          echo "📡 Generiere EPG für 10 Sprachen"
          echo "========================================="
          
          # Liste aller Sprachen
          sprachen="de en fr it es pt ru ar zh ja"
          
          for sprache in $sprachen; do
            echo ""
            echo "📡 [$sprache] Generiere EPG..."
            
            cd epg
            if npm run grab --- --lang=$sprache --output=../public/epg/$sprache.xml --days=3 --maxConnections=2; then
              echo "✅ $sprache erfolgreich"
            else
              echo "⚠️ $sprache fehlgeschlagen"
              # Leeres XML als Platzhalter
              cd ..
              cat > public/epg/$sprache.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="placeholder">
    <display-name>Keine EPG-Daten</display-name>
  </channel>
  <programme channel="placeholder" start="20240101000000 +0000" stop="20240101235959 +0000">
    <title>EPG nicht verfügbar</title>
  </programme>
</tv>
EOF
            fi
            cd ..
          done
          
          # Index-Datei erstellen
          cat > public/epg/index.json << EOF
{
  "lastUpdate": "$(date -Iseconds)",
  "languages": [
    { "code": "de", "name": "Deutsch", "flag": "🇩🇪" },
    { "code": "en", "name": "English", "flag": "🇬🇧" },
    { "code": "fr", "name": "Français", "flag": "🇫🇷" },
    { "code": "it", "name": "Italiano", "flag": "🇮🇹" },
    { "code": "es", "name": "Español", "flag": "🇪🇸" },
    { "code": "pt", "name": "Português", "flag": "🇵🇹" },
    { "code": "ru", "name": "Русский", "flag": "🇷🇺" },
    { "code": "ar", "name": "العربية", "flag": "🇸🇦" },
    { "code": "zh", "name": "中文", "flag": "🇨🇳" },
    { "code": "ja", "name": "日本語", "flag": "🇯🇵" }
  ]
}
EOF
          
          echo ""
          echo "========================================="
          echo "✅ EPG-Generierung abgeschlossen!"
          echo "========================================="
          ls -la public/epg/
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        
