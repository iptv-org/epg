name: EPG pro Land generieren

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      country_code:
        description: 'Ländercode (z.B. de, us, gb) oder "all" für alle'
        required: false
        default: 'de'
      days:
        description: 'Anzahl Tage (1-7)'
        required: false
        default: '3'

env:
  MAX_CONNECTIONS: 3
  TIMEOUT: 60000

jobs:
  # ─── Job 1: Matrix vorbereiten ───────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.country_code || 'de' }}"
          if [ "$INPUT" = "all" ]; then
            COUNTRIES="de,gb,us,fr,it,es,nl,at,ch,pl,tr,br,au,jp,se,no,dk,fi,pt,be,ie"
          else
            COUNTRIES="$INPUT"
          fi
          JSON=$(echo "$COUNTRIES" | tr ',' '\n' \
            | sed 's/^/"/;s/$/"/' | tr '\n' ',' \
            | sed 's/,$//' | sed 's/^/[/;s/$/]/')
          echo "matrix={\"country\":$JSON}" >> "$GITHUB_OUTPUT"
          echo "Generiere EPG für: $JSON"

  # ─── Job 2: Pro Land EPG generieren ──────────────────────────────────
  generate:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 4
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: iptv-org/epg klonen
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg && npm install

      - name: Sites ermitteln
        id: find-sites
        run: |
          CC="${{ matrix.country }}"
          SITES=$(cd epg && ls sites/ 2>/dev/null | grep -E "\.${CC}$|\.${CC}\." | head -5 || true)
          case "$CC" in
            de) FALLBACK="sky.de web.magentatv.de zattoo.com.de" ;;
            gb) FALLBACK="sky.co.uk bbc.co.uk" ;;
            us) FALLBACK="pluto.tv.us directv.com" ;;
            fr) FALLBACK="canalplus.fr sfr.fr" ;;
            it) FALLBACK="sky.it rai.it" ;;
            es) FALLBACK="movistar.es" ;;
            nl) FALLBACK="npo.nl" ;;
            at) FALLBACK="simpletv.at" ;;
            *)  FALLBACK="" ;;
          esac
          SITES="$SITES $FALLBACK"
          VALID=""
          for site in $SITES; do
            site=$(echo "$site" | xargs)
            [ -z "$site" ] && continue
            if [ -d "epg/sites/$site" ]; then
              VALID="$VALID $site"
              echo "✅ $site"
            else
              echo "⏭️  $site nicht verfügbar"
            fi
          done
          VALID=$(echo "$VALID" | xargs)
          echo "sites=$VALID" >> "$GITHUB_OUTPUT"

      - name: EPG grabben
        run: |
          CC="${{ matrix.country }}"
          SITES="${{ steps.find-sites.outputs.sites }}"
          DAYS="${{ github.event.inputs.days || '3' }}"
          mkdir -p "output/epg/$CC"
          if [ -z "$SITES" ]; then
            echo "{\"country\":\"$CC\",\"channels\":[],\"generated\":\"$(date -Iseconds)\"}" \
              > "output/epg/$CC/index.json"
            exit 0
          fi
          for site in $SITES; do
            echo "📡 Grabbing: $site"
            cd epg
            timeout 600 npm run grab -- \
              --site="$site" \
              --output="../output/epg/$CC/${site}.xml" \
              --days="$DAYS" \
              --maxConnections="$MAX_CONNECTIONS" \
              --timeout="$TIMEOUT" \
              2>&1 | tail -20 || echo "⚠️ Fehler bei $site"
            cd ..
            if [ -f "output/epg/$CC/${site}.xml" ]; then
              gzip -9 -f "output/epg/$CC/${site}.xml"
              echo "📦 $(wc -c < "output/epg/$CC/${site}.xml.gz") Bytes"
            fi
            sleep 3
          done

      - name: EPG nach Sendern aufteilen
        env:
          CC: ${{ matrix.country }}
        run: python3 scripts/split_epg.py

      - uses: actions/upload-artifact@v4
        with:
          name: epg-${{ matrix.country }}
          path: output/epg/${{ matrix.country }}/
          retention-days: 1
          if-no-files-found: warn

  # ─── Job 3: Deploy zu Cloudflare Pages ───────────────────────────────
  deploy:
    needs: generate
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: epg-*
          path: artifacts/
          merge-multiple: false

      - name: Artefakte zusammenführen
        run: |
          mkdir -p public/epg
          for dir in artifacts/epg-*/; do
            [ -d "$dir" ] || continue
            cc=$(basename "$dir" | sed 's/epg-//')
            mv "$dir" "public/epg/$cc"
            echo "✅ $cc verschoben"
          done

      - name: Globalen Index erstellen
        run: python3 scripts/build_index.py

      - name: Struktur anzeigen
        run: |
          find public/epg -name "index.json" | while read f; do
            cc=$(dirname "$f" | xargs basename)
            n=$(python3 -c "import json; print(len(json.load(open('$f')).get('channels',[])))" 2>/dev/null || echo "?")
            echo "  🌍 $cc: $n Sender"
          done
          echo "📊 $(find public/epg -name '*.xml.gz' | wc -l) Dateien, $(du -sh public/epg | cut -f1)"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wrangler installieren
        run: npm install -g wrangler

      - name: Zu Cloudflare Pages deployen
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -d "public/epg" ] && [ "$(ls -A public/epg 2>/dev/null)" ]; then
            wrangler pages deploy public \
              --project-name="iptv-epg-data" \
              --branch=main \
              --commit-dirty=true
          else
            echo "⚠️ Nichts zu deployen"
          fi
