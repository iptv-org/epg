name: EPG Final

on:
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: EPG-Dateien für alle Länder erstellen
        run: |
          # Verzeichnis anlegen
          mkdir -p public/epg
          
          # Alle Ländercodes (Ihre bestehende Liste)
          COUNTRIES="de at ch fr it es pt nl be lu gb ie dk se no fi is pl cz sk hu ro bg rs hr si ba me mk al gr tr cy ee lv lt by ua md ru lu mt ad li gi gg im je us ca mx gt hn sv ni cr pa bz ar bo br cl co ec gy pe py sr uy ve dz ao bj bw bf bi cm cv cf td km cd cg ci dj eg gq er sz et ga gm gh gn gw ke ls lr ly mg mw ml mr mu ma mz na ne ng rw st sn sc sl so za ss sd tz tg tn ug zm zw af am az bh bd bt bn kh cn ge in id ir iq il jp jo kz kw kg la lb my mv mn mm np om pk ps ph qa sa sg kr lk sy tw tj th tl tr tm ae uz vn ye hk mo au fj ki mh fm nr nz pw pg ws sb to tv vu"
          
          # Für jedes Land eine EPG-XML-Datei erstellen
          for country in $COUNTRIES; do
            cat > public/epg/${country}.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="${country}1">
    <display-name>${country^^} 1</display-name>
  </channel>
  <programme channel="${country}1" start="$(date -u +'%Y%m%d%H%M%S') +0000" stop="$(date -u -d '+1 hour' +'%Y%m%d%H%M%S') +0000">
    <title>Programm ${country^^}</title>
  </programme>
</tv>
EOF
            echo "✅ ${country}.xml erstellt"
          done
          
          # Index-Datei für die Übersicht
          cat > public/epg/index.json << EOF
          {
            "lastUpdate": "$(date -Iseconds)",
            "countries": [$(for c in $COUNTRIES; do echo -n "\"$c\","; done | sed 's/,$//')]
          }
          EOF
          
          echo ""
          echo "📊 Erstellte Dateien im Überblick:"
          ls -la public/epg/ | head -20
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
