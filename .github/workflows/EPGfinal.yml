name: EPG 6 Länder

on:
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: EPG Dateien erstellen
        run: |
          mkdir -p public/epg
          echo "Deutschland" > public/epg/de.txt
          echo "Italien" > public/epg/it.txt
          echo "Spanien" > public/epg/es.txt
          echo "Frankreich" > public/epg/fr.txt
          echo "Argentinien" > public/epg/ar.txt
          echo "Brasilien" > public/epg/br.txt
          echo '{"countries":["de","it","es","fr","ar","br"]}' > public/epg/index.json
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
