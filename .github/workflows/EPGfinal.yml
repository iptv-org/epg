name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🔍 Verfügbare Sites anzeigen
        run: |
          cd epg
          echo "📋 Verfügbare deutsche Sites:"
          ls -la sites/ | grep -E "ard|zdf|rtl|prosieben|sat1" || echo "Keine deutschen Sites gefunden"
      
      - name: 🚀 EPG für deutsche Sender generieren
        run: |
          echo "🚀 Starte EPG-Generierung für Deutschland..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg/de
          
          cd epg
          
          # Senderliste
          SENDER=(
            "ard.de"
            "zdf.de"
            "rtl.de"
            "sat1.de"
            "prosieben.de"
            "kabeleins.de"
            "vox.de"
            "ntv.de"
            "welt.de"
          )
          
          for sender in "${SENDER[@]}"; do
            echo ""
            echo "================================================"
            echo "📡 Generiere EPG für: $sender"
            echo "================================================"
            
            # EPG generieren
            npm run grab --- --site=$sender --output=../public/epg/de/${sender}.xml --days=3 --maxConnections=1 --timeout=60000
            
            # Prüfe Ergebnis
            if [ -f "../public/epg/de/${sender}.xml" ]; then
              size=$(wc -c < "../public/epg/de/${sender}.xml")
              echo "📦 Datei erstellt: ${sender}.xml ($size Bytes)"
              programme_count=$(grep -c "<programme" "../public/epg/de/${sender}.xml" || echo "0")
              echo "📺 Anzahl Programme: $programme_count"
            else
              echo "❌ Fehler: Keine Datei erstellt für $sender"
            fi
            
            sleep 2
          done
          
          cd ..
      
      - name: 📊 Index-Datei erstellen
        run: |
          cd public/epg/de
          
          total_dateien=$(ls *.xml 2>/dev/null | wc -l)
          total_programme=0
          
          for file in *.xml; do
            if [ -f "$file" ]; then
              prog=$(grep -c "<programme" "$file" || echo "0")
              total_programme=$((total_programme + prog))
            fi
          done
          
          # JSON manuell erstellen (ohne Here-Document)
          echo "{" > index.json
          echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
          echo "  \"country\": \"Deutschland\"," >> index.json
          echo "  \"countryCode\": \"de\"," >> index.json
          echo "  \"totalChannels\": $total_dateien," >> index.json
          echo "  \"totalProgrammes\": $total_programme," >> index.json
          echo "  \"channels\": [" >> index.json
          
          first=1
          for file in *.xml; do
            if [ -f "$file" ]; then
              if [ $first -eq 1 ]; then
                first=0
              else
                echo "," >> index.json
              fi
              channel=$(basename "$file" .xml)
              prog=$(grep -c "<programme" "$file" || echo "0")
              echo "    {\"channel\": \"$channel\", \"file\": \"$file\", \"programmes\": $prog}" >> index.json
            fi
          done
          
          echo "  ]" >> index.json
          echo "}" >> index.json
          
          echo "✅ index.json erstellt"
          cat index.json
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
