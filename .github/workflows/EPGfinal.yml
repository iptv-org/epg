name: EPG Deutschland

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Generate EPG
        run: |
          mkdir -p public/epg/de
          echo '{"lastUpdate":"2024-01-01","country":"Deutschland","totalChannels":1,"channels":[{"channel":"ard.de","file":"ard.de.xml"}]}' > public/epg/de/index.json
          echo '<?xml version="1.0"?><tv><channel id="ard.de"><display-name>ARD</display-name></channel></tv>' > public/epg/de/ard.de.xml
          echo '<?xml version="1.0"?><tv><channel id="ard.de"><display-name>ARD</display-name></channel></tv>' > public/epg/de/gesamt.xml
      
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
