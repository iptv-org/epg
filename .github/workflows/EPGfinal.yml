name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js 22 einrichten (NEU!)
        uses: actions/setup-node@v3
        with:
          node-version: '22'  # Wichtig: 22 statt 18!
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🚀 EPG für deutsche Sender generieren
        run: |
          echo "🚀 Starte EPG-Generierung für Deutschland..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg/de
          
          cd epg
          
          # Liste der deutschen Sender
          SENDER=(
            "ard.de"
            "zdf.de"
            "rtl.de"
            "sat1.de"
            "prosieben.de"
            "sky.de"  # Wurde im Diagnose gefunden
          )
          
          for sender in "${SENDER[@]}"; do
            echo "Generiere $sender..."
            npm run grab --- --site=$sender --output=../public/epg/de/$sender.xml --days=3 --maxConnections=5
            sleep 1
          done
          
          cd ..
      
      - name: 📊 Gesamt-EPG erstellen
        run: |
          cd public/epg/de
          
          # Prüfe ob Dateien existieren
          if ls *.xml 1> /dev/null 2>&1; then
            echo "✅ XML-Dateien gefunden:"
            ls -la *.xml
            
            # Einzeldateien zu gesamt.xml zusammenführen
            cat *.xml > gesamt.xml
            echo "✅ gesamt.xml erstellt"
            
            # Index erstellen
            echo "{\"lastUpdate\":\"$(date -Iseconds)\",\"country\":\"Deutschland\",\"countryCode\":\"de\",\"totalChannels\":$(ls *.xml | grep -v gesamt.xml | wc -l)}" > index.json
          else
            echo "⚠️ Keine XML-Dateien – erstelle Platzhalter"
            cat > gesamt.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="ard.de">
    <display-name>ARD</display-name>
  </channel>
  <programme channel="ard.de" start="$(date -u +'%Y%m%d%H%M%S') +0000" stop="$(date -u -d '+1 day' +'%Y%m%d%H%M%S') +0000">
    <title>EPG wird geladen</title>
    <desc>Bitte später erneut versuchen</desc>
  </programme>
</tv>
EOF
            echo "{\"lastUpdate\":\"$(date -Iseconds)\",\"country\":\"Deutschland\",\"countryCode\":\"de\",\"totalChannels\":0,\"status\":\"placeholder\"}" > index.json
          fi
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
