name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🔍 Verfügbare Sites prüfen
        run: |
          cd epg
          echo "📋 Verfügbare Sites:"
          ls -la sites/ | grep -E "pluto|sky|magentatv" || echo "Keine passenden Sites gefunden"
      
      - name: 🚀 EPG für deutsche Sender generieren
        run: |
          echo "🚀 Starte EPG-Generierung für Deutschland..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg/de
          
          cd epg
          
          # Liste der verfügbaren deutschen Sites
          SENDER=(
            "pluto.tv"
            "sky.de"
            "web.magentatv.de"
          )
          
          for sender in "${SENDER[@]}"; do
            echo ""
            echo "================================================"
            echo "📡 Generiere EPG für: $sender"
            echo "================================================"
            
            if [ -d "sites/$sender" ]; then
              echo "✅ Site gefunden: $sender"
              
              # EPG generieren
              npm run grab --- --site=$sender --output=../public/epg/de/${sender}.xml --days=3 --maxConnections=2 --timeout=60000
              
              # Prüfe Ergebnis
              if [ -f "../public/epg/de/${sender}.xml" ]; then
                size=$(wc -c < "../public/epg/de/${sender}.xml")
                echo "📦 XML: ${sender}.xml ($size Bytes)"
                
                # XML komprimieren
                gzip -f "../public/epg/de/${sender}.xml"
                gz_size=$(wc -c < "../public/epg/de/${sender}.xml.gz")
                echo "📦 Komprimiert: ${sender}.xml.gz ($gz_size Bytes)"
                
              else
                echo "❌ Keine Datei erstellt für $sender"
              fi
            else
              echo "❌ Site nicht gefunden: $sender"
            fi
            
            sleep 2
          done
          
          cd ..
      
      - name: 📊 Index erstellen
        run: |
          cd public/epg/de
          
          echo "📊 Erstelle index.json..."
          echo "{" > index.json
          echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
          echo "  \"country\": \"Deutschland\"," >> index.json
          echo "  \"countryCode\": \"de\"," >> index.json
          echo "  \"channels\": [" >> index.json
          
          first=1
          for file in *.xml.gz; do
            if [ -f "$file" ]; then
              if [ $first -eq 1 ]; then
                first=0
              else
                echo "," >> index.json
              fi
              
              channel=$(basename "$file" .xml.gz)
              size=$(wc -c < "$file")
              
              echo "    {\"channel\": \"$channel\", \"file\": \"$file\", \"size\": $size}" >> index.json
              echo "   ✅ $channel.xml.gz ($size Bytes)"
            fi
          done
          
          echo "  ]" >> index.json
          echo "}" >> index.json
          
          echo "totalChannels: $first" >> index-stats.txt
          
          echo "✅ index.json erstellt:"
          cat index.json
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
