name: EPG 6 Länder

on:
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: EPG Dateien erstellen
        run: |
          # Verzeichnis anlegen
          mkdir -p public/epg
          
          # Deutschland EPG
          cat > public/epg/de.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="ard.de">
              <display-name>ARD</display-name>
            </channel>
            <programme channel="ard.de" start="20240313183000 +0100" stop="20240313184500 +0100">
              <title>Tagesschau</title>
            </programme>
          </tv>
          EOF
          
          # Italien EPG
          cat > public/epg/it.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="rai1.it">
              <display-name>Rai 1</display-name>
            </channel>
            <programme channel="rai1.it" start="20240313203000 +0100" stop="20240313210000 +0100">
              <title>TG1</title>
            </programme>
          </tv>
          EOF
          
          # Spanien EPG
          cat > public/epg/es.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="rtve.es">
              <display-name>TVE</display-name>
            </channel>
            <programme channel="rtve.es" start="20240313210000 +0100" stop="20240313213000 +0100">
              <title>Telediario</title>
            </programme>
          </tv>
          EOF
          
          # Frankreich EPG
          cat > public/epg/fr.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="tf1.fr">
              <display-name>TF1</display-name>
            </channel>
            <programme channel="tf1.fr" start="20240313200000 +0100" stop="20240313203000 +0100">
              <title>Journal de 20h</title>
            </programme>
          </tv>
          EOF
          
          # Argentinien EPG
          cat > public/epg/ar.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="telefe.com">
              <display-name>Telefe</display-name>
            </channel>
            <programme channel="telefe.com" start="20240313200000 -0300" stop="20240313210000 -0300">
              <title>Telefe Noticias</title>
            </programme>
          </tv>
          EOF
          
          # Brasilien EPG
          cat > public/epg/br.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="globo.com">
              <display-name>Globo</display-name>
            </channel>
            <programme channel="globo.com" start="20240313203000 -0300" stop="20240313210000 -0300">
              <title>Jornal Nacional</title>
            </programme>
          </tv>
          EOF
          
          # Index-Datei
          cat > public/epg/index.json << 'EOF'
          {
            "lastUpdate": "2024-03-13T12:00:00Z",
            "countries": ["de", "it", "es", "fr", "ar", "br"]
          }
          EOF
          
          echo "✅ EPG Dateien erstellt"
          ls -la public/epg/
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
