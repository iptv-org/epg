name: EPG Deutschland

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: EPG herunterladen
        run: |
          mkdir -p public/epg/de
          echo "📡 Lade EPG von open-epg.com..."
          curl -L -o public/epg/de/gesamt.xml "https://www.open-epg.com/files/germany1.xml"
          echo "✅ EPG geladen: $(wc -l < public/epg/de/gesamt.xml) Zeilen"
      
      - name: Warten auf Cloudflare (10 Sekunden)
        run: sleep 10
      
      - name: Zu Cloudflare deployen (mit Retry)
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_on: error
          command: |
            npx wrangler pages deploy public --project-name=iptv-epg-data --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
