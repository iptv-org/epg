name: EPG Diagnose

on:
  workflow_dispatch:  # Nur manuell starten

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 System info
        run: |
          echo "Node version:"
          node --version
          echo "npm version:"
          npm --version
          echo "OS:"
          uname -a
      
      - name: 📡 EPG-Quellen testen
        run: |
          # Test 1: Ist iptv-org/epg erreichbar?
          echo "Test 1: Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install
          
          # Test 2: Welche Sites sind verfügbar?
          echo ""
          echo "Test 2: Verfügbare Sites für Deutschland:"
          ls -la sites/ | grep -i "de\|ard\|zdf\|rtl" | head -10 || echo "Keine deutschen Sites gefunden"
          
          # Test 3: Versuche ARD mit minimalen Optionen
          echo ""
          echo "Test 3: Versuche ARD EPG (minimal)..."
          mkdir -p ../public
          if npm run grab --- --site=ard.de --output=../public/ard-debug.xml --days=1 --maxConnections=1 --timeout=10000; then
            echo "✅ ARD erfolgreich"
          else
            echo "⚠️ ARD fehlgeschlagen"
          fi
          
          # Test 4: Versuche allgemeine deutsche Quelle
          echo ""
          echo "Test 4: Versuche allgemeine deutsche Quelle..."
          if npm run grab --- --site=de --output=../public/de-debug.xml --days=1 --maxConnections=1 --timeout=10000; then
            echo "✅ DE erfolgreich"
          else
            echo "⚠️ DE fehlgeschlagen"
          fi
          
          cd ..
          
          # Test 5: Zeige Ergebnisse
          echo ""
          echo "Test 5: Generierte Dateien:"
          ls -la public/ || echo "❌ Keine Dateien in public/"
          
          # Test 6: Zeige Logs falls vorhanden
          echo ""
          echo "Test 6: EPG Logs:"
          if [ -f "epg/logs.txt" ]; then
            cat epg/logs.txt
          else
            echo "ℹ️ Keine Logs gefunden"
          fi
      
      - name: 📤 Ergebnisse hochladen (v4)
        uses: actions/upload-artifact@v4
        with:
          name: epg-diagnose-logs
          path: |
            public/
            epg/logs.txt
            epg/sites/
          retention-days: 7
          if-no-files-found: warn
      
      - name: 📋 Zusammenfassung
        run: |
          echo ""
          echo "================================================"
          echo "📊 Diagnose abgeschlossen"
          echo "================================================"
          echo "✅ Logs wurden als Artifact hochgeladen"
          echo "📁 Sie können sie hier herunterladen:"
          echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "================================================"
