name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🔍 Verfügbare Sites anzeigen
        run: |
          cd epg
          echo "📋 Verfügbare deutsche Sites:"
          ls -la sites/ | grep -E "ard|zdf|rtl|prosieben|sat1" || echo "Keine deutschen Sites gefunden"
      
      - name: 🚀 EPG für deutsche Sender generieren
        run: |
          echo "🚀 Starte EPG-Generierung für Deutschland..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg/de
          
          cd epg
          
          # Verbesserte Senderliste mit korrekten Site-Namen
          SENDER=(
            "ard.de"
            "zdf.de"
            "rtl.de"
            "sat1.de"
            "prosieben.de"
            "kabeleins.de"
            "vox.de"
            "ntv.de"
            "welt.de"
          )
          
          for sender in "${SENDER[@]}"; do
            echo ""
            echo "================================================"
            echo "📡 Generiere EPG für: $sender"
            echo "================================================"
            
            # Prüfe ob Site existiert
            if [ -d "sites/$sender" ]; then
              echo "✅ Site $sender gefunden"
            else
              echo "⚠️ Site $sender nicht gefunden, versuche trotzdem..."
            fi
            
            # EPG generieren mit ausführlicher Ausgabe
            npm run grab --- --site=$sender --output=../public/epg/de/${sender}.xml --days=3 --maxConnections=1 --timeout=60000
            
            # Prüfe Ergebnis
            if [ -f "../public/epg/de/${sender}.xml" ]; then
              size=$(wc -c < "../public/epg/de/${sender}.xml")
              echo "📦 Datei erstellt: ${sender}.xml ($size Bytes)"
              
              # Zeige die ersten Zeilen der XML
              echo "📄 XML-Vorschau (erste 10 Zeilen):"
              head -10 "../public/epg/de/${sender}.xml"
              
              # Prüfe ob Programme enthalten sind
              programme_count=$(grep -c "<programme" "../public/epg/de/${sender}.xml" || echo "0")
              echo "📺 Anzahl Programme: $programme_count"
              
              if [ "$programme_count" -eq 0 ]; then
                echo "⚠️ Keine Programme gefunden!"
              fi
            else
              echo "❌ Fehler: Keine Datei erstellt für $sender"
            fi
            
            sleep 2
          done
          
          cd ..
      
      - name: 📊 Gesamtstatistik
        run: |
          cd public/epg/de
          
          echo ""
          echo "================================================"
          echo "📊 Gesamtstatistik"
          echo "================================================"
          
          total_dateien=0
          total_programme=0
          
          for file in *.xml; do
            if [ -f "$file" ]; then
              programme=$(grep -c "<programme" "$file" || echo "0")
              size=$(wc -c < "$file")
              echo "📄 $file: $programme Programme, $size Bytes"
              total_dateien=$((total_dateien + 1))
              total_programme=$((total_programme + programme))
            fi
          done
          
          echo "----------------------------------------"
          echo "📊 Zusammenfassung:"
          echo "   📁 Dateien: $total_dateien"
          echo "   📺 Programme insgesamt: $total_programme"
          
          # Index.json erstellen
          echo ""
          echo "📊 Erstelle index.json..."
          
          cat > index.json << EOF
{
  "lastUpdate": "$(date -Iseconds)",
  "country": "Deutschland",
  "countryCode": "de",
  "totalChannels": $total_dateien,
  "totalProgrammes": $total_programme,
  "channels": [
EOF
          
          first=1
          for file in *.xml; do
            if [ -f "$file" ] && [ "$file" != "gesamt.xml" ]; then
              if [ $first -eq 1 ]; then
                first=0
              else
                echo "," >> index.json
              fi
              channel=$(basename "$file" .xml)
              prog=$(grep -c "<programme" "$file" || echo "0")
              echo "    {\"channel\": \"$channel\", \"file\": \"$file\", \"programmes\": $prog}" >> index.json
            fi
          done
          
          cat >> index.json << EOF
  
  ]
}
EOF
          
          echo "✅ index.json erstellt"
          echo "================================================"
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
