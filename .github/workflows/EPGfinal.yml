steps:
  - name: Repository auschecken
    uses: actions/checkout@v3

  - name: EPG für 6 Länder erstellen
    run: |
      mkdir -p public/epg

      # Deutschland
      cat > public/epg/de.txt <<EOF
      ard.de
      zdf.de
      rtl.de
      sat1.de
      prosieben.de
      vox.de
      ntv.de
      welt.de
      3sat.de
      arte.tv
      kika.de
      phoenix.de
      EOF

      # Italien
      cat > public/epg/it.txt <<EOF
      rai.it
      mediaset.it
      la7.it
      sky.it
      EOF

      # Spanien
      cat > public/epg/es.txt <<EOF
      rtve.es
      antena3.com
      telecinco.es
      cuatro.com
      lasexta.com
      EOF

      # Frankreich
      cat > public/epg/fr.txt <<EOF
      francetv.fr
      tf1.fr
      m6.fr
      canalplus.com
      bfmtv.com
      EOF

      # Argentinien
      cat > public/epg/ar.txt <<EOF
      telefe.com
      eltrece.tv
      tn.com.ar
      tycsports.com
      EOF

      # Brasilien
      cat > public/epg/br.txt <<EOF
      redeglobo.globo.com
      recordtv.com.br
      sbt.com.br
      band.com.br
      cnnbrasil.com.br
      EOF

      # Ländernamen
      cat > public/epg/namen.txt <<EOF
      Deutschland|de
      Italien|it
      Spanien|es
      Frankreich|fr
      Argentinien|ar
      Brasilien|br
      EOF

      # JSON Index
      cat > public/epg/index.json <<EOF
      {
        "lastUpdate": "$(date -Iseconds)",
        "countries": [
          { "code": "de", "name": "Deutschland", "flag": "🇩🇪" },
          { "code": "it", "name": "Italien", "flag": "🇮🇹" },
          { "code": "es", "name": "Spanien", "flag": "🇪🇸" },
          { "code": "fr", "name": "Frankreich", "flag": "🇫🇷" },
          { "code": "ar", "name": "Argentinien", "flag": "🇦🇷" },
          { "code": "br", "name": "Brasilien", "flag": "🇧🇷" }
        ]
      }
      EOF

      echo "EPG-Dateien erstellt"
      ls -la public/epg

  - name: Nach Cloudflare Pages deployen
    uses: cloudflare/pages-action@v1
    with:
      apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
      accountId: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
      projectName: "iptv-epg-data"
      directory: "public"
      gitHubToken: "${{ secrets.GITHUB_TOKE
