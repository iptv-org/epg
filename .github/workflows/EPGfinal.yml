name: EPG Deutschland

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install
      
      - name: Generate EPG for all German channels
        run: |
          mkdir -p public/epg/de
          cd epg
          
          # Alle deutschen Sender
          SENDER=(
            "ard.de"
            "zdf.de"
            "rtl.de"
            "sat1.de"
            "prosieben.de"
            "kabeleins.de"
            "vox.de"
            "ntv.de"
            "welt.de"
            "dmax.de"
            "tele5.de"
            "sixx.de"
            "rtl2.de"
            "superrtl.de"
            "kika.de"
            "3sat.de"
            "arte.tv"
            "phoenix.de"
          )
          
          for sender in "${SENDER[@]}"; do
            echo "📡 Generiere $sender..."
            if npm run grab --- --site=$sender --output=../public/epg/de/$sender.xml --days=3; then
              echo "✅ $sender erfolgreich"
            else
              echo "⚠️ $sender fehlgeschlagen - erstelle Platzhalter"
              cd ..
              echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/de/$sender.xml
              echo '<tv>' >> public/epg/de/$sender.xml
              echo "  <channel id=\"$sender\">" >> public/epg/de/$sender.xml
              echo "    <display-name>${sender%.*}</display-name>" >> public/epg/de/$sender.xml
              echo '  </channel>' >> public/epg/de/$sender.xml
              echo '</tv>' >> public/epg/de/$sender.xml
              cd epg
            fi
            sleep 1
          done
          
          cd ..
      
      - name: Create combined EPG and index
        run: |
          cd public/epg/de
          
          # Gesamt-XML erstellen
          echo '<?xml version="1.0" encoding="UTF-8"?>' > gesamt.xml
          echo '<tv>' >> gesamt.xml
          
          for file in *.xml; do
            if [ "$file" != "gesamt.xml" ]; then
              echo "➕ Füge hinzu: $file"
              # Inhalt ohne XML-Header und Footer einfügen
              tail -n +2 "$file" | head -n -1 >> gesamt.xml
            fi
          done
          
          echo '</tv>' >> gesamt.xml
          
          # Index.json erstellen
          echo "{" > index.json
          echo '  "lastUpdate": "'$(date -Iseconds)'",' >> index.json
          echo '  "country": "Deutschland",' >> index.json
          echo '  "countryCode": "de",' >> index.json
          echo '  "totalChannels": '$(ls *.xml | grep -v gesamt.xml | wc -l)',' >> index.json
          echo '  "channels": [' >> index.json
          
          first=1
          for file in *.xml; do
            if [ "$file" != "gesamt.xml" ]; then
              if [ $first -eq 1 ]; then
                first=0
              else
                echo "," >> index.json
              fi
              channel=$(basename "$file" .xml)
              echo '    {"channel": "'$channel'", "file": "'$file'"}' >> index.json
            fi
          done
          
          echo '  ]' >> index.json
          echo "}" >> index.json
          
          echo "✅ gesamt.xml erstellt"
          echo "✅ index.json erstellt"
          echo ""
          echo "📁 Generierte Dateien:"
          ls -la
      
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
