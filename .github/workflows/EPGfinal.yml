name: EPG Weltweit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: iptv-org/epg installieren
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install
      
      - name: EPG für alle Sprachen generieren
        run: |
          # Verzeichnis anlegen
          mkdir -p public/epg
          
          echo "========================================="
          echo "📡 Generiere EPG für 10 Sprachen"
          echo "========================================="
          
          # Liste aller Sprachen
          sprachen="de en fr it es pt ru ar zh ja"
          
          for sprache in $sprachen; do
            echo ""
            echo "📡 [$sprache] Generiere EPG..."
            
            cd epg
            if npm run grab --- --lang=$sprache --output=../public/epg/$sprache.xml --days=3 --maxConnections=2; then
              echo "✅ $sprache erfolgreich"
            else
              echo "⚠️ $sprache fehlgeschlagen"
              cd ..
              # Leeres XML als Platzhalter - OHNE << EOF PROBLEME!
              echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/$sprache.xml
              echo '<tv>' >> public/epg/$sprache.xml
              echo '  <channel id="placeholder">' >> public/epg/$sprache.xml
              echo '    <display-name>Keine EPG-Daten</display-name>' >> public/epg/$sprache.xml
              echo '  </channel>' >> public/epg/$sprache.xml
              echo '  <programme channel="placeholder" start="20240101000000 +0000" stop="20240101235959 +0000">' >> public/epg/$sprache.xml
              echo '    <title>EPG nicht verfügbar</title>' >> public/epg/$sprache.xml
              echo '  </programme>' >> public/epg/$sprache.xml
              echo '</tv>' >> public/epg/$sprache.xml
            fi
            cd ..
          done
          
          # Index-Datei erstellen
          echo "{" > public/epg/index.json
          echo '  "lastUpdate": "'$(date -Iseconds)'",' >> public/epg/index.json
          echo '  "languages": [' >> public/epg/index.json
          echo '    { "code": "de", "name": "Deutsch", "flag": "🇩🇪" },' >> public/epg/index.json
          echo '    { "code": "en", "name": "English", "flag": "🇬🇧" },' >> public/epg/index.json
          echo '    { "code": "fr", "name": "Français", "flag": "🇫🇷" },' >> public/epg/index.json
          echo '    { "code": "it", "name": "Italiano", "flag": "🇮🇹" },' >> public/epg/index.json
          echo '    { "code": "es", "name": "Español", "flag": "🇪🇸" },' >> public/epg/index.json
          echo '    { "code": "pt", "name": "Português", "flag": "🇵🇹" },' >> public/epg/index.json
          echo '    { "code": "ru", "name": "Русский", "flag": "🇷🇺" },' >> public/epg/index.json
          echo '    { "code": "ar", "name": "العربية", "flag": "🇸🇦" },' >> public/epg/index.json
          echo '    { "code": "zh", "name": "中文", "flag": "🇨🇳" },' >> public/epg/index.json
          echo '    { "code": "ja", "name": "日本語", "flag": "🇯🇵" }' >> public/epg/index.json
          echo '  ]' >> public/epg/index.json
          echo '}' >> public/epg/index.json
          
          echo ""
          echo "========================================="
          echo "✅ EPG-Generierung abgeschlossen!"
          echo "========================================="
          ls -la public/epg/
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
