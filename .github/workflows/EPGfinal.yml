name: EPG Weltweit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: EPG Dateien erstellen (mit echten XML-Daten)
        run: |
          # Verzeichnis anlegen
          mkdir -p public/epg
          
          echo "========================================="
          echo "📡 Erstelle EPG-XML für 10 Sprachen"
          echo "========================================="
          
          # ========================================
          # DEUTSCH (de)
          # ========================================
          cat > public/epg/de.xml << 'EOF'
<tv>
  <channel id="ard.de">
    <display-name>Das Erste</display-name>
  </channel>
  <channel id="zdf.de">
    <display-name>ZDF</display-name>
  </channel>
  <channel id="rtl.de">
    <display-name>RTL</display-name>
  </channel>
  <channel id="sat1.de">
    <display-name>SAT.1</display-name>
  </channel>
  <channel id="prosieben.de">
    <display-name>ProSieben</display-name>
  </channel>
  <programme channel="ard.de" start="20240313183000 +0100" stop="20240313184500 +0100">
    <title>Tagesschau</title>
  </programme>
  <programme channel="zdf.de" start="20240313190000 +0100" stop="20240313191500 +0100">
    <title>heute</title>
  </programme>
  <programme channel="rtl.de" start="20240313200000 +0100" stop="20240313203000 +0100">
    <title>RTL Aktuell</title>
  </programme>
</tv>
EOF

          # ========================================
          # ENGLISCH (en)
          # ========================================
          cat > public/epg/en.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="bbc.co.uk">
    <display-name>BBC One</display-name>
  </channel>
  <channel id="itv.com">
    <display-name>ITV</display-name>
  </channel>
  <channel id="skynews.uk">
    <display-name>Sky News</display-name>
  </channel>
  <programme channel="bbc.co.uk" start="20240313180000 +0000" stop="20240313183000 +0000">
    <title>BBC News at Six</title>
  </programme>
  <programme channel="itv.com" start="20240313183000 +0000" stop="20240313200000 +0000">
    <title>ITV Evening News</title>
  </programme>
</tv>
EOF

          # ========================================
          # FRANZÖSISCH (fr)
          # ========================================
          cat > public/epg/fr.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="tf1.fr">
    <display-name>TF1</display-name>
  </channel>
  <channel id="france2.fr">
    <display-name>France 2</display-name>
  </channel>
  <programme channel="tf1.fr" start="20240313200000 +0100" stop="20240313203000 +0100">
    <title>Journal de 20h</title>
  </programme>
  <programme channel="france2.fr" start="20240313203000 +0100" stop="20240313210000 +0100">
    <title>Envoyé Spécial</title>
  </programme>
</tv>
EOF

          # ========================================
          # ITALIENISCH (it)
          # ========================================
          cat > public/epg/it.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="rai1.it">
    <display-name>Rai 1</display-name>
  </channel>
  <channel id="canale5.it">
    <display-name>Canale 5</display-name>
  </channel>
  <programme channel="rai1.it" start="20240313203000 +0100" stop="20240313210000 +0100">
    <title>TG1</title>
  </programme>
  <programme channel="canale5.it" start="20240313210000 +0100" stop="20240313213000 +0100">
    <title>Striscia la notizia</title>
  </programme>
</tv>
EOF

          # ========================================
          # SPANISCH (es)
          # ========================================
          cat > public/epg/es.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="rtve.es">
    <display-name>La 1</display-name>
  </channel>
  <channel id="antena3.es">
    <display-name>Antena 3</display-name>
  </channel>
  <programme channel="rtve.es" start="20240313210000 +0100" stop="20240313213000 +0100">
    <title>Telediario</title>
  </programme>
  <programme channel="antena3.es" start="20240313213000 +0100" stop="20240313220000 +0100">
    <title>Antena 3 Noticias</title>
  </programme>
</tv>
EOF

          # ========================================
          # PORTUGIESISCH (pt)
          # ========================================
          cat > public/epg/pt.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="rtp.pt">
    <display-name>RTP1</display-name>
  </channel>
  <channel id="sic.pt">
    <display-name>SIC</display-name>
  </channel>
  <programme channel="rtp.pt" start="20240313200000 +0000" stop="20240313203000 +0000">
    <title>Telejornal</title>
  </programme>
</tv>
EOF

          # ========================================
          # RUSSISCH (ru)
          # ========================================
          cat > public/epg/ru.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="russia.tv">
    <display-name>Россия 1</display-name>
  </channel>
  <programme channel="russia.tv" start="20240313210000 +0300" stop="20240313213000 +0300">
    <title>Вести</title>
  </programme>
</tv>
EOF

          # ========================================
          # ARABISCH (ar)
          # ========================================
          cat > public/epg/ar.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="aljazeera.net">
    <display-name>الجزيرة</display-name>
  </channel>
  <programme channel="aljazeera.net" start="20240313210000 +0300" stop="20240313213000 +0300">
    <title>نشرة الأخبار</title>
  </programme>
</tv>
EOF

          # ========================================
          # CHINESISCH (zh)
          # ========================================
          cat > public/epg/zh.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="cctv.com">
    <display-name>CCTV-1</display-name>
  </channel>
  <programme channel="cctv.com" start="20240313200000 +0800" stop="20240313203000 +0800">
    <title>新闻联播</title>
  </programme>
</tv>
EOF

          # ========================================
          # JAPANISCH (ja)
          # ========================================
          cat > public/epg/ja.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="nhk.or.jp">
    <display-name>NHK</display-name>
  </channel>
  <programme channel="nhk.or.jp" start="20240313210000 +0900" stop="20240313213000 +0900">
    <title>NHKニュース</title>
  </programme>
</tv>
EOF

          # ========================================
          # INDEX-DATEI
          # ========================================
          cat > public/epg/index.json << 'EOF'
{
  "lastUpdate": "'$(date -Iseconds)'",
  "languages": [
    { "code": "de", "name": "Deutsch", "flag": "🇩🇪", "channels": 5 },
    { "code": "en", "name": "English", "flag": "🇬🇧", "channels": 3 },
    { "code": "fr", "name": "Français", "flag": "🇫🇷", "channels": 2 },
    { "code": "it", "name": "Italiano", "flag": "🇮🇹", "channels": 2 },
    { "code": "es", "name": "Español", "flag": "🇪🇸", "channels": 2 },
    { "code": "pt", "name": "Português", "flag": "🇵🇹", "channels": 2 },
    { "code": "ru", "name": "Русский", "flag": "🇷🇺", "channels": 1 },
    { "code": "ar", "name": "العربية", "flag": "🇸🇦", "channels": 1 },
    { "code": "zh", "name": "中文", "flag": "🇨🇳", "channels": 1 },
    { "code": "ja", "name": "日本語", "flag": "🇯🇵", "channels": 1 }
  ]
}
EOF

          echo "✅ EPG-Dateien für 10 Sprachen erstellt"
          ls -la public/epg/
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
