name: EPG Weltweit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: EPG Dateien erstellen
        run: |
          # Verzeichnis anlegen
          mkdir -p public/epg
          
          echo "========================================="
          echo "📡 Erstelle EPG-XML für 10 Sprachen"
          echo "========================================="
          
          # ========================================
          # DEUTSCH (de)
          # ========================================
          echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/de.xml
          echo '<tv>' >> public/epg/de.xml
          echo '  <channel id="ard.de">' >> public/epg/de.xml
          echo '    <display-name>Das Erste</display-name>' >> public/epg/de.xml
          echo '  </channel>' >> public/epg/de.xml
          echo '  <channel id="zdf.de">' >> public/epg/de.xml
          echo '    <display-name>ZDF</display-name>' >> public/epg/de.xml
          echo '  </channel>' >> public/epg/de.xml
          echo '  <channel id="rtl.de">' >> public/epg/de.xml
          echo '    <display-name>RTL</display-name>' >> public/epg/de.xml
          echo '  </channel>' >> public/epg/de.xml
          echo '  <channel id="sat1.de">' >> public/epg/de.xml
          echo '    <display-name>SAT.1</display-name>' >> public/epg/de.xml
          echo '  </channel>' >> public/epg/de.xml
          echo '  <channel id="prosieben.de">' >> public/epg/de.xml
          echo '    <display-name>ProSieben</display-name>' >> public/epg/de.xml
          echo '  </channel>' >> public/epg/de.xml
          echo '  <programme channel="ard.de" start="20240313183000 +0100" stop="20240313184500 +0100">' >> public/epg/de.xml
          echo '    <title>Tagesschau</title>' >> public/epg/de.xml
          echo '  </programme>' >> public/epg/de.xml
          echo '  <programme channel="zdf.de" start="20240313190000 +0100" stop="20240313191500 +0100">' >> public/epg/de.xml
          echo '    <title>heute</title>' >> public/epg/de.xml
          echo '  </programme>' >> public/epg/de.xml
          echo '  <programme channel="rtl.de" start="20240313200000 +0100" stop="20240313203000 +0100">' >> public/epg/de.xml
          echo '    <title>RTL Aktuell</title>' >> public/epg/de.xml
          echo '  </programme>' >> public/epg/de.xml
          echo '</tv>' >> public/epg/de.xml
          
          # ========================================
          # ENGLISCH (en)
          # ========================================
          echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/en.xml
          echo '<tv>' >> public/epg/en.xml
          echo '  <channel id="bbc.co.uk">' >> public/epg/en.xml
          echo '    <display-name>BBC One</display-name>' >> public/epg/en.xml
          echo '  </channel>' >> public/epg/en.xml
          echo '  <channel id="itv.com">' >> public/epg/en.xml
          echo '    <display-name>ITV</display-name>' >> public/epg/en.xml
          echo '  </channel>' >> public/epg/en.xml
          echo '  <programme channel="bbc.co.uk" start="20240313180000 +0000" stop="20240313183000 +0000">' >> public/epg/en.xml
          echo '    <title>BBC News at Six</title>' >> public/epg/en.xml
          echo '  </programme>' >> public/epg/en.xml
          echo '  <programme channel="itv.com" start="20240313183000 +0000" stop="20240313200000 +0000">' >> public/epg/en.xml
          echo '    <title>ITV Evening News</title>' >> public/epg/en.xml
          echo '  </programme>' >> public/epg/en.xml
          echo '</tv>' >> public/epg/en.xml
          
          # ========================================
          # FRANZÖSISCH (fr)
          # ========================================
          echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/fr.xml
          echo '<tv>' >> public/epg/fr.xml
          echo '  <channel id="tf1.fr">' >> public/epg/fr.xml
          echo '    <display-name>TF1</display-name>' >> public/epg/fr.xml
          echo '  </channel>' >> public/epg/fr.xml
          echo '  <channel id="france2.fr">' >> public/epg/fr.xml
          echo '    <display-name>France 2</display-name>' >> public/epg/fr.xml
          echo '  </channel>' >> public/epg/fr.xml
          echo '  <programme channel="tf1.fr" start="20240313200000 +0100" stop="20240313203000 +0100">' >> public/epg/fr.xml
          echo '    <title>Journal de 20h</title>' >> public/epg/fr.xml
          echo '  </programme>' >> public/epg/fr.xml
          echo '  <programme channel="france2.fr" start="20240313203000 +0100" stop="20240313210000 +0100">' >> public/epg/fr.xml
          echo '    <title>Envoyé Spécial</title>' >> public/epg/fr.xml
          echo '  </programme>' >> public/epg/fr.xml
          echo '</tv>' >> public/epg/fr.xml
          
          # ========================================
          # ITALIENISCH (it)
          # ========================================
          echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/it.xml
          echo '<tv>' >> public/epg/it.xml
          echo '  <channel id="rai1.it">' >> public/epg/it.xml
          echo '    <display-name>Rai 1</display-name>' >> public/epg/it.xml
          echo '  </channel>' >> public/epg/it.xml
          echo '  <channel id="canale5.it">' >> public/epg/it.xml
          echo '    <display-name>Canale 5</display-name>' >> public/epg/it.xml
          echo '  </channel>' >> public/epg/it.xml
          echo '  <programme channel="rai1.it" start="20240313203000 +0100" stop="20240313210000 +0100">' >> public/epg/it.xml
          echo '    <title>TG1</title>' >> public/epg/it.xml
          echo '  </programme>' >> public/epg/it.xml
          echo '  <programme channel="canale5.it" start="20240313210000 +0100" stop="20240313213000 +0100">' >> public/epg/it.xml
          echo '    <title>Striscia la notizia</title>' >> public/epg/it.xml
          echo '  </programme>' >> public/epg/it.xml
          echo '</tv>' >> public/epg/it.xml
          
          # ========================================
          # SPANISCH (es)
          # ========================================
          echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/es.xml
          echo '<tv>' >> public/epg/es.xml
          echo '  <channel id="rtve.es">' >> public/epg/es.xml
          echo '    <display-name>La 1</display-name>' >> public/epg/es.xml
          echo '  </channel>' >> public/epg/es.xml
          echo '  <channel id="antena3.es">' >> public/epg/es.xml
          echo '    <display-name>Antena 3</display-name>' >> public/epg/es.xml
          echo '  </channel>' >> public/epg/es.xml
          echo '  <programme channel="rtve.es" start="20240313210000 +0100" stop="20240313213000 +0100">' >> public/epg/es.xml
          echo '    <title>Telediario</title>' >> public/epg/es.xml
          echo '  </programme>' >> public/epg/es.xml
          echo '  <programme channel="antena3.es" start="20240313213000 +0100" stop="20240313220000 +0100">' >> public/epg/es.xml
          echo '    <title>Antena 3 Noticias</title>' >> public/epg/es.xml
          echo '  </programme>' >> public/epg/es.xml
          echo '</tv>' >> public/epg/es.xml
          
          # ========================================
          # INDEX-DATEI
          # ========================================
          echo '{' > public/epg/index.json
          echo '  "lastUpdate": "'$(date -Iseconds)'",' >> public/epg/index.json
          echo '  "languages": [' >> public/epg/index.json
          echo '    { "code": "de", "name": "Deutsch", "flag": "🇩🇪", "channels": 5 },' >> public/epg/index.json
          echo '    { "code": "en", "name": "English", "flag": "🇬🇧", "channels": 2 },' >> public/epg/index.json
          echo '    { "code": "fr", "name": "Français", "flag": "🇫🇷", "channels": 2 },' >> public/epg/index.json
          echo '    { "code": "it", "name": "Italiano", "flag": "🇮🇹", "channels": 2 },' >> public/epg/index.json
          echo '    { "code": "es", "name": "Español", "flag": "🇪🇸", "channels": 2 }' >> public/epg/index.json
          echo '  ]' >> public/epg/index.json
          echo '}' >> public/epg/index.json
          
          echo ""
          echo "========================================="
          echo "✅ EPG-Dateien erfolgreich erstellt!"
          echo "========================================="
          ls -la public/epg/
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
