name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 📁 Verzeichnis erstellen
        run: |
          mkdir -p public/epg/de
          echo "✅ Verzeichnis public/epg/de erstellt"
      
      - name: 📥 EPG von iptv-org direkt herunterladen
        run: |
          echo "📡 Lade EPG für deutsche Sender..."
          
          # Liste der deutschen Sender mit direkten EPG-URLs
          # Quelle: https://github.com/iptv-org/epg/tree/master/guides
          
          # ARD
          curl -L -o public/epg/de/ard.de.xml "https://epg.iptvx.one/guides/de/ard.iptv-org.xml" || echo "⚠️ ARD fehlgeschlagen"
          
          # ZDF
          curl -L -o public/epg/de/zdf.de.xml "https://epg.iptvx.one/guides/de/zdf.iptv-org.xml" || echo "⚠️ ZDF fehlgeschlagen"
          
          # RTL
          curl -L -o public/epg/de/rtl.de.xml "https://epg.iptvx.one/guides/de/rtl.iptv-org.xml" || echo "⚠️ RTL fehlgeschlagen"
          
          # Sat.1
          curl -L -o public/epg/de/sat1.de.xml "https://epg.iptvx.one/guides/de/sat1.iptv-org.xml" || echo "⚠️ Sat.1 fehlgeschlagen"
          
          # ProSieben
          curl -L -o public/epg/de/prosieben.de.xml "https://epg.iptvx.one/guides/de/prosieben.iptv-org.xml" || echo "⚠️ ProSieben fehlgeschlagen"
          
          # VOX
          curl -L -o public/epg/de/vox.de.xml "https://epg.iptvx.one/guides/de/vox.iptv-org.xml" || echo "⚠️ VOX fehlgeschlagen"
          
          # n-tv
          curl -L -o public/epg/de/ntv.de.xml "https://epg.iptvx.one/guides/de/ntv.iptv-org.xml" || echo "⚠️ n-tv fehlgeschlagen"
          
          # Welt
          curl -L -o public/epg/de/welt.de.xml "https://epg.iptvx.one/guides/de/welt.iptv-org.xml" || echo "⚠️ Welt fehlgeschlagen"
          
          echo "✅ Downloads abgeschlossen"
      
      - name: 📊 Prüfe heruntergeladene Dateien
        run: |
          cd public/epg/de
          echo "📁 Gefundene Dateien:"
          ls -la *.xml 2>/dev/null || echo "⚠️ Keine XML-Dateien gefunden"
          
          # Zeige Dateigrößen
          for file in *.xml; do
            if [ -f "$file" ]; then
              size=$(wc -c < "$file")
              echo "   📄 $file: $size Bytes"
            fi
          done
      
      - name: 📊 Erstelle index.json
        run: |
          cd public/epg/de
          
          # Zähle XML-Dateien
          count=$(ls *.xml 2>/dev/null | wc -l)
          
          if [ "$count" -gt 0 ]; then
            echo "✅ $count XML-Dateien gefunden"
            
            # JSON manuell erstellen (ohne echo-Probleme)
            echo "{" > index.json
            echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
            echo "  \"country\": \"Deutschland\"," >> index.json
            echo "  \"countryCode\": \"de\"," >> index.json
            echo "  \"totalChannels\": $count," >> index.json
            echo "  \"channels\": [" >> index.json
            
            # Channels auflisten
            first=1
            for file in *.xml; do
              if [ "$first" -eq 1 ]; then
                first=0
              else
                echo "," >> index.json
              fi
              channel=$(basename "$file" .xml)
              size=$(wc -c < "$file")
              echo "    {\"channel\": \"$channel\", \"file\": \"$file\", \"size\": $size}" >> index.json
            done
            
            echo "  ]" >> index.json
            echo "}" >> index.json
            
            echo "✅ index.json erstellt"
            echo ""
            echo "📄 Inhalt von index.json:"
            cat index.json
          else
            echo "⚠️ Keine XML-Dateien zum Erstellen von index.json"
            exit 1
          fi
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Abschluss
        run: |
          echo ""
          echo "================================================"
          echo "✅ EPG-Update erfolgreich abgeschlossen!"
          echo "================================================"
          echo "📊 Verfügbar unter:"
          echo "   • https://iptv-epg-data.pages.dev/epg/de/index.json"
          echo "   • https://iptv-epg-data.pages.dev/epg/de/[sender].xml"
          echo ""
          echo "📊 Generierte Sender:"
          ls -1 public/epg/de/*.xml 2>/dev/null | sed 's/.*\///' || echo "   Keine"
          echo "================================================"
