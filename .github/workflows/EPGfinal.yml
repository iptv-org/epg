name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js 22 einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🚀 EPG für deutsche Sender generieren
        run: |
          echo "🚀 Starte EPG-Generierung für Deutschland..."
          
          # Ausgabeverzeichnis erstellen
          mkdir -p public/epg/de
          
          cd epg
          
          # Liste der deutschen Sender
          SENDER=(
            "ard.de"
            "zdf.de"
            "rtl.de"
            "sat1.de"
            "prosieben.de"
            "sky.de"
          )
          
          for sender in "${SENDER[@]}"; do
            echo "Generiere $sender..."
            npm run grab --- --site=$sender --output=../public/epg/de/$sender.xml --days=3 --maxConnections=5 || echo "⚠️ Fehler bei $sender"
            sleep 1
          done
          
          cd ..
      
      - name: 📊 Gesamt-EPG erstellen
        run: |
          cd public/epg/de
          
          # Prüfe ob XML-Dateien existieren
          if ls *.xml 1> /dev/null 2>&1; then
            echo "✅ XML-Dateien gefunden:"
            ls -la *.xml
            
            # Einzeldateien zu gesamt.xml zusammenführen
            cat *.xml > gesamt.xml
            echo "✅ gesamt.xml erstellt"
            
            # Index erstellen (korrigiertes JSON-Format)
            TOTAL_CHANNELS=$(ls *.xml | grep -v gesamt.xml | wc -l)
            cat > index.json << EOF
{
  "lastUpdate": "$(date -Iseconds)",
  "country": "Deutschland",
  "countryCode": "de",
  "totalChannels": $TOTAL_CHANNELS
}
EOF
            echo "✅ index.json erstellt"
          else
            echo "⚠️ Keine XML-Dateien – erstelle Platzhalter"
            cat > gesamt.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="ard.de">
    <display-name>ARD</display-name>
  </channel>
  <programme channel="ard.de" start="20240312000000 +0000" stop="20240312235959 +0000">
    <title>EPG wird geladen</title>
    <desc>Bitte später erneut versuchen</desc>
  </programme>
</tv>
EOF
            cat > index.json << EOF
{
  "lastUpdate": "$(date -Iseconds)",
  "country": "Deutschland",
  "countryCode": "de",
  "totalChannels": 0,
  "status": "placeholder"
}
EOF
          fi
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Abschluss
        run: |
          echo ""
          echo "================================================"
          echo "✅ Workflow abgeschlossen"
          echo "================================================"
          echo "📊 EPG verfügbar unter:"
          echo "   https://iptv-epg-data.pages.dev/epg/de/gesamt.xml"
          echo "   https://iptv-epg-data.pages.dev/epg/de/index.json"
          echo "================================================"
