name: EPG Deutschland

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install
      
      - name: Generate EPG for ARD
        run: |
          mkdir -p public/epg/de
          cd epg
          echo "📡 Generiere EPG für ARD..."
          if npm run grab --- --site=ard.de --output=../public/epg/de/ard.de.xml --days=1; then
            echo "✅ ARD erfolgreich"
          else
            echo "⚠️ ARD fehlgeschlagen - erstelle Testdaten"
            cd ..
            echo '<?xml version="1.0" encoding="UTF-8"?>' > public/epg/de/ard.de.xml
            echo '<tv>' >> public/epg/de/ard.de.xml
            echo '  <channel id="ard.de">' >> public/epg/de/ard.de.xml
            echo '    <display-name>ARD</display-name>' >> public/epg/de/ard.de.xml
            echo '  </channel>' >> public/epg/de/ard.de.xml
            echo '  <programme channel="ard.de" start="20240313180000 +0100" stop="20240313184500 +0100">' >> public/epg/de/ard.de.xml
            echo '    <title>Tagesschau</title>' >> public/epg/de/ard.de.xml
            echo '    <desc>Die Nachrichten</desc>' >> public/epg/de/ard.de.xml
            echo '  </programme>' >> public/epg/de/ard.de.xml
            echo '</tv>' >> public/epg/de/ard.de.xml
          fi
          cd ..
      
      - name: Create index.json and gesamt.xml
        run: |
          cd public/epg/de
          
          # Prüfe ob Datei existiert
          if [ ! -f "ard.de.xml" ]; then
            echo "⚠️ Keine EPG-Datei gefunden - erstelle Testdaten"
            echo '<?xml version="1.0" encoding="UTF-8"?>' > ard.de.xml
            echo '<tv>' >> ard.de.xml
            echo '  <channel id="ard.de">' >> ard.de.xml
            echo '    <display-name>ARD</display-name>' >> ard.de.xml
            echo '  </channel>' >> ard.de.xml
            echo '</tv>' >> ard.de.xml
          fi
          
          # Kopie als gesamt.xml
          cp ard.de.xml gesamt.xml
          
          # Index.json erstellen
          echo "{" > index.json
          echo '  "lastUpdate": "'$(date -Iseconds)'",' >> index.json
          echo '  "country": "Deutschland",' >> index.json
          echo '  "countryCode": "de",' >> index.json
          echo '  "totalChannels": 1,' >> index.json
          echo '  "channels": [' >> index.json
          echo '    {"channel": "ard.de", "file": "ard.de.xml"}' >> index.json
          echo '  ]' >> index.json
          echo "}" >> index.json
          
          echo "✅ Dateien erstellt:"
          ls -la
      
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
