name: Create combined EPG and index
  run: |
    cd public/epg/de
    
    # XML-Header für gesamt.xml
    echo '<?xml version="1.0" encoding="UTF-8"?>' > gesamt.xml
    echo '<tv>' >> gesamt.xml
    
    # Alle XML-Dateien zusammenführen (außer gesamt.xml selbst)
    for file in *.xml; do
      if [ "$file" != "gesamt.xml" ]; then
        echo "➕ Füge hinzu: $file"
        # Extrahiere Inhalt ohne XML-Header und ohne Footer
        sed '1d' "$file" | sed '$d' >> gesamt.xml || true
      fi
    done
    
    echo '</tv>' >> gesamt.xml
    
    # Anzahl der echten Channel-Dateien zählen
    channel_count=$(ls *.xml | grep -v "gesamt.xml" | wc -l)
    
    # Index.json erstellen (KORRIGIERT)
    echo "{" > index.json
    echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
    echo "  \"country\": \"Deutschland\"," >> index.json
    echo "  \"countryCode\": \"de\"," >> index.json
    echo "  \"totalChannels\": $channel_count," >> index.json
    echo "  \"channels\": [" >> index.json
    
    first=1
    for file in *.xml; do
      if [ "$file" != "gesamt.xml" ]; then
        if [ $first -eq 1 ]; then
          first=0
        else
          echo "," >> index.json
        fi
        channel=$(basename "$file" .xml)
        echo "    {\"channel\": \"$channel\", \"file\": \"$file\"}" >> index.json
      fi
    done
    
    echo "" >> index.json
    echo "  ]" >> index.json
    echo "}" >> index.json
    
    echo "✅ gesamt.xml und index.json erstellt"
    echo "📊 Gefundene Channels: $channel_count"
    ls -la *.xml
