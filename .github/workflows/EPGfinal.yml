name: EPG Deutschland

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: EPG herunterladen
        run: |
          mkdir -p public/epg/de
          curl -L -o public/epg/de/gesamt.xml "https://www.open-epg.com/files/germany1.xml"
          echo "✅ EPG geladen"
      
      - name: Deploy zu Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
