name: EPG für 6 Länder generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        country: [de, it, es, fr, ar, br]
      max-parallel: 2
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📥 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 📝 Kanalliste für ${{ matrix.country }} erstellen
        run: |
          mkdir -p epg-custom
          
          # Deutschland
          if [ "${{ matrix.country }}" = "de" ]; then
            cat > epg-custom/de-channels.xml <<'EOF'
