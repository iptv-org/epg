name: EPG Weltweit

on:
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3
      
      - name: EPG für ALLE Länder erstellen
        run: |
          mkdir -p public/epg
          
          # Länderliste (nur 3 zum Testen!)
          cat > public/epg/laender.txt << 'EOF'
          de it fr
          EOF
          
          # ERSTE XML-Datei für Deutschland
          cat > public/epg/de.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <tv>
            <channel id="de.1">
              <display-name>DE 1</display-name>
            </channel>
          </tv>
          EOF
          
          ls -la public/epg/
      
      - name: Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "epg"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
