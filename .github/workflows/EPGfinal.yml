name: EPG für Deutschland generieren

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-german-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Repository auschecken
        uses: actions/checkout@v3
      
      - name: 🔧 Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: 📡 iptv-org/epg klonen
        run: |
          echo "📡 Klone iptv-org/epg..."
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          echo "📦 Installiere Abhängigkeiten..."
          npm install
          echo "✅ iptv-org/epg bereit"
      
      - name: 🚀 EPG für deutsche Sender generieren (reduziert)
        run: |
          echo "🚀 Starte EPG-Generierung für Deutschland..."
          
          mkdir -p public/epg/de
          cd epg
          
          # Liste der verfügbaren deutschen Sites
          SENDER=(
            "sky.de"
            "web.magentatv.de"
            "pluto.tv"
            "arte.tv"
          )
          
          for sender in "${SENDER[@]}"; do
            echo ""
            echo "================================================"
            echo "📡 Generiere EPG für: $sender"
            echo "================================================"
            
            if [ -d "sites/$sender" ]; then
              echo "✅ Site gefunden: $sender"
              
              # EPG generieren - NUR 3 TAGE
              npm run grab --- --site=$sender --output=../public/epg/de/${sender}.xml --days=3 --maxConnections=2 --timeout=60000
              
              # Prüfe Ergebnis
              if [ -f "../public/epg/de/${sender}.xml" ]; then
                size=$(wc -c < "../public/epg/de/${sender}.xml")
                echo "📦 XML: ${sender}.xml ($size Bytes)"
                
                # In kleinere Teile aufteilen (pro Tag)
                echo "🔄 Teile EPG in Tagesdateien auf..."
                
                # Extrahiere Programme pro Tag
                for day in 0 1 2; do
                  date=$(date -u -d "+$day day" +"%Y%m%d")
                  output_file="../public/epg/de/${sender}_day${day}.xml"
                  
                  # XML-Header
                  echo '<?xml version="1.0" encoding="UTF-8"?>' > "$output_file"
                  echo '<tv>' >> "$output_file"
                  
                  # Extrahiere Channel Info
                  grep -A5 "<channel" "../public/epg/de/${sender}.xml" | head -6 >> "$output_file"
                  
                  # Extrahiere Programme für diesen Tag
                  grep -E "<programme.*start=\"$date[0-9]*" "../public/epg/de/${sender}.xml" >> "$output_file"
                  
                  # XML-Footer
                  echo '</tv>' >> "$output_file"
                  
                  # Komprimiere
                  gzip -f "$output_file"
                  day_size=$(wc -c < "${output_file}.gz")
                  echo "   📦 Tag $day: ${day_size} Bytes"
                done
                
                # Gesamtdatei komprimieren
                gzip -f "../public/epg/de/${sender}.xml"
                total_size=$(wc -c < "../public/epg/de/${sender}.xml.gz")
                echo "📦 Gesamt (gz): ${sender}.xml.gz ($total_size Bytes)"
                
              else
                echo "❌ Keine Datei erstellt für $sender"
              fi
            else
              echo "❌ Site nicht gefunden: $sender"
            fi
            
            sleep 2
          done
          
          cd ..
      
      - name: 📊 Index erstellen
        run: |
          cd public/epg/de
          
          echo "{" > index.json
          echo "  \"lastUpdate\": \"$(date -Iseconds)\"," >> index.json
          echo "  \"country\": \"Deutschland\"," >> index.json
          echo "  \"countryCode\": \"de\"," >> index.json
          echo "  \"channels\": [" >> index.json
          
          first=1
          for file in *.xml.gz; do
            if [ -f "$file" ] && [[ ! "$file" =~ _day[0-2]\.xml\.gz$ ]]; then
              if [ $first -eq 1 ]; then
                first=0
              else
                echo "," >> index.json
              fi
              channel=$(basename "$file" .xml.gz)
              size=$(wc -c < "$file")
              echo "    {\"channel\": \"$channel\", \"file\": \"$file\", \"size\": $size}" >> index.json
            fi
          done
          
          echo "  ]" >> index.json
          echo "}" >> index.json
          
          echo "✅ index.json erstellt"
          cat index.json
      
      - name: 📤 Nach Cloudflare Pages deployen
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
