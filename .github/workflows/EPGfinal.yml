name: EPG Deutschland

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install
      
      - name: Generate EPG for ARD
        run: |
          mkdir -p public/epg/de
          cd epg
          echo "📡 Generiere EPG für ARD..."
          if npm run grab --- --site=ard.de --output=../public/epg/de/ard.de.xml --days=1; then
            echo "✅ ARD erfolgreich"
          else
            echo "⚠️ ARD fehlgeschlagen - erstelle Testdaten"
            cd ..
            cat > public/epg/de/ard.de.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="ard.de">
    <display-name>ARD</display-name>
  </channel>
  <programme channel="ard.de" start="20240313180000 +0100" stop="20240313184500 +0100">
    <title>Tagesschau</title>
    <desc>Die Nachrichten</desc>
  </programme>
</tv>
EOF
          fi
          cd ..
      
      - name: Create index.json and gesamt.xml
        run: |
          cd public/epg/de
          
          # Prüfe ob Datei existiert
          if [ ! -f "ard.de.xml" ]; then
            echo "⚠️ Keine EPG-Datei gefunden - erstelle Testdaten"
            cat > ard.de.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <channel id="ard.de">
    <display-name>ARD</display-name>
  </channel>
</tv>
EOF
          fi
          
          # Kopie als gesamt.xml
          cp ard.de.xml gesamt.xml
          
          # Index.json erstellen
          cat > index.json << EOF
{
  "lastUpdate": "$(date -Iseconds)",
  "country": "Deutschland",
  "countryCode": "de",
  "totalChannels": 1,
  "channels": [
    {"channel": "ard.de", "file": "ard.de.xml"}
  ]
}
EOF
          
          echo "✅ Dateien erstellt:"
          ls -la
      
      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "iptv-epg-data"
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
